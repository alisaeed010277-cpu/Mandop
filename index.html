<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="مندوب بيطري">
<meta name="theme-color" content="#1A5276">
<title>مدير المندوب البيطري المتكامل</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Segoe UI',Tahoma,Arial,sans-serif;direction:rtl;background:#F0F4F8;color:#1C2833;font-size:14px;min-height:100vh;font-feature-settings:"lnum";}
input,select,td,th,.sum-num,.list-item-bal-num{font-feature-settings:"lnum";}
input[type=date],input[type=number]{direction:ltr;text-align:right;}
input,select,button{font-family:inherit;font-size:14px;}
input:focus,select:focus{outline:2px solid #2E86C1;}
.header{background:#1A5276;color:#fff;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 8px rgba(0,0,0,.2);position:sticky;top:0;z-index:100;}
.header-title{font-size:17px;font-weight:bold;}
.header-sub{font-size:11px;opacity:.75;margin-top:2px;}
.header-date{font-size:11px;opacity:.7;}
.watermark{text-align:center;padding:3px;font-size:10px;color:#aaa;background:#fff;border-top:1px solid #eee;position:fixed;bottom:0;left:0;right:0;z-index:200;pointer-events:none;user-select:none;}
.tabs{display:flex;background:#fff;border-bottom:2px solid #D5D8DC;overflow-x:auto;-webkit-overflow-scrolling:touch;position:sticky;top:56px;z-index:99;}
.tabs::-webkit-scrollbar{display:none;}
.tab{padding:10px 13px;cursor:pointer;font-size:12px;font-weight:normal;color:#717D7E;border:none;border-bottom:3px solid transparent;white-space:nowrap;background:none;flex-shrink:0;}
.tab.active{color:#2E86C1;font-weight:bold;border-bottom-color:#2E86C1;}
.body{padding:12px;max-width:700px;margin:0 auto;padding-bottom:50px;}
.card{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:12px;overflow:hidden;}
.card-head{background:#1A5276;color:#fff;padding:10px 14px;font-size:14px;font-weight:bold;display:flex;justify-content:space-between;align-items:center;}
.card-head.green{background:#1E8449;}
.card-head.orange{background:#D68910;}
.card-body{padding:14px;}
.summary{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:12px;}
.sum-card{flex:1;min-width:130px;border-radius:10px;padding:12px 14px;color:#fff;box-shadow:0 2px 6px rgba(0,0,0,.12);}
.sum-card.blue{background:#1A5276;}
.sum-card.red{background:#C0392B;}
.sum-card.green{background:#1E8449;}
.sum-card.orange{background:#D68910;}
.sum-num{font-size:20px;font-weight:bold;margin-bottom:2px;}
.sum-lbl{font-size:11px;opacity:.85;}
.form-row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.form-group{flex:1;min-width:120px;}
.lbl{font-size:12px;color:#717D7E;margin-bottom:3px;}
input[type=text],input[type=number],input[type=date],select,input[type=tel]{border:1px solid #D5D8DC;border-radius:6px;padding:8px 10px;width:100%;background:#FDFEFE;color:#1C2833;direction:rtl;}
.btn{border:none;border-radius:6px;padding:9px 14px;font-size:13px;cursor:pointer;font-weight:bold;white-space:nowrap;color:#fff;}
.btn.blue{background:#1A5276;}
.btn.green{background:#1E8449;}
.btn.red{background:#C0392B;}
.btn.gray{background:#717D7E;}
.btn.orange{background:#D68910;}
.btn.purple{background:#7D3C98;}
.btn-outline{background:none;color:#1A5276;border:1px solid #1A5276;border-radius:6px;padding:8px 14px;font-size:13px;cursor:pointer;font-weight:bold;}
.btn-sm{border:none;border-radius:5px;padding:5px 10px;font-size:12px;cursor:pointer;font-weight:bold;color:#fff;}
.btn-sm.blue{background:#2E86C1;}
.btn-sm.red{background:#C0392B;}
.btn-sm.green{background:#1E8449;}
.btn-sm.purple{background:#7D3C98;}
.btn-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
table{width:100%;border-collapse:collapse;font-size:13px;}
th{background:#1A5276;color:#fff;padding:8px 10px;text-align:right;font-size:12px;}
td{padding:7px 10px;border-bottom:1px solid #D5D8DC;vertical-align:middle;}
tr:nth-child(even) td{background:#F2F3F4;}
tr:nth-child(odd) td{background:#FDFEFE;}
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;}
.badge{display:inline-block;border-radius:12px;padding:2px 8px;font-size:11px;font-weight:bold;}
.badge.red{background:#F9EBEA;color:#C0392B;}
.badge.green{background:#E9F7EF;color:#1E8449;}
.badge.orange{background:#FEF9E7;color:#D68910;}
.badge.blue{background:#EBF5FB;color:#2E86C1;}
.list-item{background:#fff;border-radius:10px;box-shadow:0 1px 4px rgba(0,0,0,.08);margin-bottom:8px;overflow:hidden;}
.list-item-head{padding:10px 14px;display:flex;justify-content:space-between;align-items:center;}
.list-item-name{font-weight:bold;font-size:15px;}
.list-item-sub{font-size:12px;color:#717D7E;margin-top:2px;}
.list-item-actions{padding:4px 14px 10px;display:flex;gap:6px;flex-wrap:wrap;}
.list-item-bal{text-align:center;}
.list-item-bal-num{font-weight:bold;font-size:15px;}
.list-item-bal-lbl{font-size:11px;color:#717D7E;}
.divider{border-top:1px solid #D5D8DC;margin:10px 0;}
.empty{text-align:center;color:#717D7E;padding:30px 0;font-size:13px;}
.back-row{display:flex;align-items:center;gap:10px;margin-bottom:12px;}
.page-title{font-weight:bold;font-size:16px;}
.section-title{font-weight:bold;margin-bottom:8px;font-size:13px;}
.line-box{background:#F0F4F8;border-radius:8px;padding:10px;margin-bottom:8px;}
.warn-box{border:1px solid #D68910;}
.search-row{display:flex;gap:8px;margin-bottom:10px;}
.sub-tabs{display:flex;gap:8px;margin-bottom:12px;}
.bonus-box{background:#E8F8F5;border:1px solid #27AE60;border-radius:6px;padding:6px 10px;font-size:12px;color:#1E8449;margin-top:4px;}

/* SPLASH SCREEN */
#splashScreen{position:fixed;top:0;left:0;right:0;bottom:0;background:linear-gradient(135deg,#1A5276,#1E8449);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;animation:fadeOut .6s ease forwards;animation-delay:2s;color:#fff;padding:20px;}
#splashScreen .splash-icon{font-size:60px;margin-bottom:14px;animation:popIn .5s ease;}
#splashScreen .splash-title{font-size:20px;font-weight:bold;margin-bottom:6px;animation:slideUp .5s ease .15s both;}
#splashScreen .splash-sub{font-size:13px;opacity:.85;margin-bottom:28px;animation:slideUp .5s ease .25s both;}
#splashScreen .splash-dev{font-size:14px;font-weight:bold;animation:slideUp .5s ease .35s both;}
#splashScreen .splash-phone{font-size:13px;opacity:.9;margin-top:4px;animation:slideUp .5s ease .45s both;}
#splashScreen .splash-line{width:50px;height:3px;background:#fff;opacity:.5;border-radius:3px;margin:16px 0;animation:slideUp .5s ease .3s both;}
@keyframes popIn{from{transform:scale(.5);opacity:0;}to{transform:scale(1);opacity:1;}}
@keyframes slideUp{from{transform:translateY(15px);opacity:0;}to{transform:translateY(0);opacity:1;}}
@keyframes fadeOut{to{opacity:0;visibility:hidden;}}
</style>
</head>
<body>

<div id="splashScreen">
  <div class="splash-icon">🐔</div>
  <div class="splash-title">مدير المندوب البيطري المتكامل</div>
  <div class="splash-sub">إدارة العملاء والفواتير والمخزن</div>
  <div class="splash-line"></div>
  <div class="splash-dev">Ali Saeed (ElNokhba)</div>
  <div class="splash-phone">📞 01552623744</div>
</div>



<div class="header">
  <div>
    <div class="header-title">🐔 مدير المندوب البيطري المتكامل</div>
    <div class="header-sub">إدارة العملاء والفواتير والمخزن</div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
    <div class="header-date" id="todayDate"></div>
    <div style="display:flex;gap:6px">
      <button onclick="exportData()" style="background:#27AE60;color:#fff;border:none;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer">💾 تصدير</button>
      <button onclick="importData()" style="background:#D68910;color:#fff;border:none;border-radius:5px;padding:4px 8px;font-size:11px;cursor:pointer">📂 استيراد</button>
    </div>
  </div>
</div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('home')">🏠 الرئيسية</button>
  <button class="tab" onclick="switchTab('clients')">👥 العملاء</button>
  <button class="tab" onclick="switchTab('invoices')">🧾 الفواتير</button>
  <button class="tab" onclick="switchTab('payments')">💰 السداد</button>
  <button class="tab" onclick="switchTab('returns')">↩️ المرتجع</button>
  <button class="tab" onclick="switchTab('stock')">📦 المخزن</button>
</div>

<div class="body">
  <div id="tab-home"></div>
  <div id="tab-clients" style="display:none"></div>
  <div id="tab-invoices" style="display:none"></div>
  <div id="tab-payments" style="display:none"></div>
  <div id="tab-returns" style="display:none"></div>
  <div id="tab-stock" style="display:none"></div>
</div>

<!-- WATERMARK - ثابت لا يمكن حذفه -->
<div class="watermark">🐔 Developed by: Ali Saeed (ElNokhba) — 01552623744</div>

<script>
const DB = {
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}}
};
const KEYS={clients:'vs_clients',invoices:'vs_invoices',payments:'vs_payments',stock:'vs_stock',movements:'vs_movements',returns:'vs_returns'};

let clients=DB.get(KEYS.clients)||[];
let invoices=DB.get(KEYS.invoices)||[];
let payments=DB.get(KEYS.payments)||[];
let stock=DB.get(KEYS.stock)||[];
let movements=DB.get(KEYS.movements)||[];
let returns=DB.get(KEYS.returns)||[];

const save=()=>{DB.set(KEYS.clients,clients);DB.set(KEYS.invoices,invoices);DB.set(KEYS.payments,payments);DB.set(KEYS.stock,stock);DB.set(KEYS.movements,movements);DB.set(KEYS.returns,returns);};
let _id=Date.now();
const uid=()=>(++_id).toString(36);
const today=()=>new Date().toISOString().slice(0,10);
const fmt=(n)=>Number(n||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});

const clientBalance=(cid)=>{
  const c=clients.find(c=>c.id===cid);
  const opening=Number(c?.opening||0);
  const total=invoices.filter(i=>i.clientId===cid).reduce((s,i)=>s+i.total,0);
  const paid=payments.filter(p=>p.clientId===cid).reduce((s,p)=>s+p.amount,0);
  const ret=returns.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.total,0);
  return opening+total-paid-ret;
};
const stockQty=(pid)=>movements.filter(m=>m.productId===pid).reduce((s,m)=>m.type==='in'?s+m.qty:s-m.qty,0);

function updateHeaderDate(){
  document.getElementById('todayDate').textContent=today();
}
updateHeaderDate();
setInterval(updateHeaderDate, 60000);

let currentTab='home';
function switchTab(name){
  document.querySelectorAll('.tab').forEach((t,i)=>{
    t.classList.toggle('active',['home','clients','invoices','payments','returns','stock'][i]===name);
  });
  ['home','clients','invoices','payments','returns','stock'].forEach(t=>{
    document.getElementById('tab-'+t).style.display=t===name?'':'none';
  });
  currentTab=name;render();
}
function render(){
  if(currentTab==='home')renderHome();
  else if(currentTab==='clients')renderClients();
  else if(currentTab==='invoices')renderInvoices();
  else if(currentTab==='payments')renderPayments();
  else if(currentTab==='returns')renderReturns();
  else if(currentTab==='stock')renderStock();
}

// ===== HOME =====
function renderHome(){
  const totalSales=invoices.reduce((s,i)=>s+i.total,0);
  const totalPaid=payments.reduce((s,p)=>s+p.amount,0);
  const totalReturns=returns.reduce((s,r)=>s+r.total,0);
  const totalDebt=clients.reduce((s,c)=>s+Math.max(0,clientBalance(c.id)),0);
  const debtorCount=clients.filter(c=>clientBalance(c.id)>0).length;
  const lowStock=stock.filter(p=>stockQty(p.id)<10);
  let lowRows=lowStock.map(p=>`<div style="display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid #D5D8DC;"><span>${p.name}</span><span style="color:#C0392B;font-weight:bold">${stockQty(p.id)} وحدة</span></div>`).join('');

  // جدول العملاء
  const clientRows=clients.map(c=>{
    const opening=Number(c.opening||0);
    const sales=invoices.filter(i=>i.clientId===c.id).reduce((s,i)=>s+i.total,0);
    const paid=payments.filter(p=>p.clientId===c.id).reduce((s,p)=>s+p.amount,0);
    const ret=returns.filter(r=>r.clientId===c.id).reduce((s,r)=>s+r.total,0);
    const bal=clientBalance(c.id);
    const balColor=bal>0?'#C0392B':bal<0?'#1E8449':'#717D7E';
    return `<tr onclick="clientDetailId='${c.id}';switchTab('clients')" style="cursor:pointer">
      <td style="font-weight:bold">${c.name}</td>
      <td style="text-align:center;color:#D68910">${opening>0?fmt(opening):'—'}</td>
      <td style="text-align:center;color:#1A5276">${sales>0?fmt(sales):'—'}</td>
      <td style="text-align:center;color:#D68910">${ret>0?fmt(ret):'—'}</td>
      <td style="text-align:center;color:#1E8449">${paid>0?fmt(paid):'—'}</td>
      <td style="text-align:center;font-weight:bold;color:${balColor}">${fmt(Math.abs(bal))}${bal>0?' 🔴':bal<0?' 🟢':''}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-home').innerHTML=`
    <div class="summary">
      <div class="sum-card blue"><div class="sum-num">${fmt(totalSales)}</div><div class="sum-lbl">إجمالي البيع</div></div>
      <div class="sum-card green"><div class="sum-num">${fmt(totalPaid)}</div><div class="sum-lbl">إجمالي السداد</div></div>
      <div class="sum-card orange"><div class="sum-num">${fmt(totalReturns)}</div><div class="sum-lbl">إجمالي المردودات</div></div>
      <div class="sum-card red"><div class="sum-num">${fmt(totalDebt)}</div><div class="sum-lbl">إجمالي المديونية</div></div>
    </div>
    <div class="summary">
      <div class="sum-card blue"><div class="sum-num">${debtorCount}</div><div class="sum-lbl">عملاء بهم رصيد</div></div>
    </div>
    ${clients.length>0?`
    <div class="card">
      <div class="card-head">👥 ملخص العملاء</div>
      <div class="tbl-wrap">
        <table>
          <thead><tr>
            <th>العميل</th>
            <th style="text-align:center">رصيد أول المدة</th>
            <th style="text-align:center">إجمالي المبيعات</th>
            <th style="text-align:center">إجمالي المردودات</th>
            <th style="text-align:center">إجمالي السداد</th>
            <th style="text-align:center">المديونية</th>
          </tr></thead>
          <tbody>${clientRows}</tbody>
        </table>
      </div>
    </div>`:''}
    ${lowStock.length>0?`<div class="card warn-box"><div class="card-head orange">⚠️ منتجات قاربت على النفاد</div><div class="card-body">${lowRows}</div></div>`:''}`;
}

// ===== CLIENTS =====
let clientSearch='';
let clientDetailId=null;

function renderClients(){
  if(clientDetailId){renderClientDetail();return;}
  const filtered=clients.filter(c=>c.name.includes(clientSearch)||c.area?.includes(clientSearch)||c.phone?.includes(clientSearch));
  let items=filtered.map(c=>{
    const bal=clientBalance(c.id);
    const balColor=bal>0?'#C0392B':'#1E8449';
    const balLbl=bal>0?'مستحق':bal<0?'له رصيد':'صافي';
    return `<div class="list-item">
      <div class="list-item-head">
        <div><div class="list-item-name">${c.name}</div><div class="list-item-sub">${c.area?'📍 '+c.area:''}${c.phone?' • 📞 '+c.phone:''}</div></div>
        <div class="list-item-bal"><div class="list-item-bal-num" style="color:${balColor}">${fmt(Math.abs(bal))} ج</div><div class="list-item-bal-lbl">${balLbl}</div></div>
      </div>
      <div class="list-item-actions">
        <button class="btn-sm blue" onclick="openClientDetail('${c.id}')">📋 كشف حساب</button>
        <button class="btn-sm purple" onclick="shareClientStatement('${c.id}')">📲 واتساب</button>
        <button class="btn-sm red" onclick="deleteClient('${c.id}')">🗑 حذف</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('tab-clients').innerHTML=`
    <div class="card">
      <div class="card-head green">إضافة عميل جديد</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group" style="flex:2"><div class="lbl">اسم العميل *</div><input type="text" id="c_name" placeholder="اسم العميل"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">رقم الموبايل</div><input type="tel" id="c_phone" placeholder="01xxxxxxxxx"></div>
          <div class="form-group"><div class="lbl">المنطقة</div><input type="text" id="c_area" placeholder="المنطقة"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">رصيد افتتاحي (ج) — اختياري</div><input type="number" id="c_opening" placeholder="0" min="0"></div>
          <div class="form-group"><div class="lbl">تاريخ الرصيد الافتتاحي</div><input type="date" id="c_opening_date" value="${today()}"></div>
        </div>
        <button class="btn green" onclick="addClient()">+ إضافة عميل</button>
      </div>
    </div>
    <div class="search-row">
      <input type="text" style="flex:1;border:1px solid #D5D8DC;border-radius:6px;padding:8px 10px;" placeholder="🔍 بحث..." value="${clientSearch}" oninput="clientSearch=this.value;renderClients()">
    </div>
    ${filtered.length===0?'<div class="empty">لا يوجد عملاء</div>':items}`;
}

function addClient(){
  const name=document.getElementById('c_name').value.trim();
  const phone=document.getElementById('c_phone').value.trim();
  const area=document.getElementById('c_area').value.trim();
  const opening=Number(document.getElementById('c_opening')?.value||0);
  const openingDate=document.getElementById('c_opening_date')?.value||today();
  if(!name){alert('أدخل اسم العميل');return;}
  clients.push({id:uid(),name,phone,area,opening,openingDate,createdAt:today()});
  save();renderClients();
}
function deleteClient(id){if(!confirm('هتحذف العميل ده؟'))return;clients=clients.filter(c=>c.id!==id);save();renderClients();}
function openClientDetail(id){clientDetailId=id;renderClients();}

function shareClientStatement(cid){
  const c=clients.find(c=>c.id===cid);
  if(!c)return;
  const bal=clientBalance(c.id);
  const totalInv=invoices.filter(i=>i.clientId===cid).reduce((s,i)=>s+i.total,0);
  const totalPaid=payments.filter(p=>p.clientId===cid).reduce((s,p)=>s+p.amount,0);
  const balLbl=bal>0?'مستحق عليه':bal<0?'له رصيد':'الحساب صافي';
  let msg=`🐔 *كشف حساب*\n`;
  msg+=`━━━━━━━━━━━━━━\n`;
  msg+=`👤 العميل: ${c.name}\n`;
  if(c.phone) msg+=`📞 ${c.phone}\n`;
  msg+=`📅 التاريخ: ${today()}\n`;
  msg+=`━━━━━━━━━━━━━━\n`;
  msg+=`🧾 إجمالي الفواتير: ${fmt(totalInv)} ج\n`;
  msg+=`✅ إجمالي المدفوع: ${fmt(totalPaid)} ج\n`;
  msg+=`💰 ${balLbl}: ${fmt(Math.abs(bal))} ج\n`;
  msg+=`━━━━━━━━━━━━━━\n`;
  const url='https://wa.me/?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

function renderClientDetail(){
  const c=clients.find(c=>c.id===clientDetailId);
  if(!c){clientDetailId=null;renderClients();return;}
  const bal=clientBalance(c.id);
  const cInvoices=invoices.filter(i=>i.clientId===c.id);
  const cPayments=payments.filter(p=>p.clientId===c.id);
  const cReturns=returns.filter(r=>r.clientId===c.id);
  const totalInv=cInvoices.reduce((s,i)=>s+i.total,0);
  const totalPaid=cPayments.reduce((s,p)=>s+p.amount,0);
  const totalRet=cReturns.reduce((s,r)=>s+r.total,0);
  const events=[
    ...(c.opening>0?[{date:c.openingDate||c.createdAt?.slice(0,10)||today(),type:'opening',label:'رصيد افتتاحي',amount:c.opening,id:null}]:[]),
    ...cInvoices.map(i=>({date:i.date,type:'invoice',label:'فاتورة #'+(i.number||i.id.slice(-4)),amount:i.total,id:i.id})),

    </div>
    <div class="btn-row" style="margin-bottom:10px">
      <button class="btn purple" onclick="shareClientStatement('${c.id}')">📲 مشاركة نصية واتساب</button>

      <div class="card-head">📋 حركات الحساب</div>
      ${events.length===0?'<div class="empty">لا توجد حركات</div>':`<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th></tr></thead><tbody>${rows}</tbody></table></div>`}

function renderInvoices(){

  const filtered=[...invoices].filter(inv=>{

    return !invSearch||c?.name.includes(invSearch)||String(inv.number).includes(invSearch);
  }).sort((a,b)=>b.date.localeCompare(a.date));
  const rows=filtered.map(inv=>{
    const c=clients.find(c=>c.id===inv.clientId);
    return `<tr>
      <td>${inv.number}</td><td>${c?.name||'—'}</td><td>${inv.date}</td>
      <td style="font-weight:bold;color:#1A5276">${fmt(inv.total)} ج</td>
      <td>
        <button class="btn-sm blue" onclick="invDetailId='${inv.id}';renderInvoices()">👁</button>

    const afterDiscount=l.price*(1-(Number(l.discount)||0)/100);
    const lineTotal=Number(l.qty)*afterDiscount;
    const bonusQty=Number(l.bonus)||0;
    return `<div class="line-box">
      <div class="form-row">
        <div class="form-group" style="flex:2">
          <div class="lbl">المنتج</div>
          ${stock.length>0?`<select onchange="updateLine('${l.id}','productId',this.value)">${stockOpts}</select>`:`<input type="text" value="${l.productName}" placeholder="اسم المنتج" onchange="updateLine('${l.id}','productName',this.value)">`}
        </div>
        <div class="form-group">
          <div class="lbl">الكمية</div>
          <input type="number" min="1" value="${l.qty}" onchange="updateLine('${l.id}','qty',this.value)">
        </div>
        <div class="form-group">
          <div class="lbl">السعر (ج)</div>
          <input type="number" min="0" value="${l.price}" onchange="updateLine('${l.id}','price',this.value)">
        </div>
      </div>
      <div class="form-row">
        <div class="form-group">
          <div class="lbl">خصم %</div>
          <input type="number" min="0" max="100" value="${l.discount||0}" placeholder="0" onchange="updateLine('${l.id}','discount',this.value)">
        </div>
        <div class="form-group">
          <div class="lbl">بونص/هدية (وحدة)</div>
          <input type="number" min="0" value="${l.bonus||0}" placeholder="0" onchange="updateLine('${l.id}','bonus',this.value)">
        </div>
        <div class="form-group">
          <div class="lbl">الإجمالي</div>
          <div style="padding:8px 0;font-weight:bold;color:#1A5276">${fmt(lineTotal)} ج</div>
        </div>
        ${invLines.length>1?`<button class="btn red" style="padding:6px 10px;align-self:flex-end" onclick="removeLine('${l.id}')">✕</button>`:''}
      </div>
      ${bonusQty>0||l.discount>0?`<div class="bonus-box">
        ${l.discount>0?`✂️ خصم ${l.discount}% على السعر`:''}
        ${bonusQty>0?` &nbsp;🎁 ${bonusQty} وحدة هدية (تُخصم من المخزن بدون حساب)`:''}
      </div>`:''}
    </div>`;
  }).join('');
  const total=invLines.reduce((s,l)=>{
    const afterDiscount=Number(l.price)*(1-(Number(l.discount)||0)/100);
    return s+(Number(l.qty)*afterDiscount);
  },0);
  document.getElementById('tab-invoices').innerHTML=`
    ${showInvForm?`
    <div class="card">
      <div class="card-head green">إنشاء فاتورة جديدة</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group" style="flex:2"><div class="lbl">العميل *</div><select id="inv_client"><option value="">— اختر عميل —</option>${clientOpts}</select></div>
          <div class="form-group"><div class="lbl">التاريخ</div><input type="date" id="inv_date" value="${today()}"></div>
        </div>
        <div class="divider"></div>
        <div class="section-title">📦 أصناف الفاتورة</div>
        ${linesHtml}
        <button class="btn-outline" style="margin-bottom:10px" onclick="addLine()">+ إضافة صنف</button>
        <div class="divider"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div style="font-weight:bold;font-size:16px;color:#1A5276">الإجمالي: ${fmt(total)} جنيه</div>
          <div class="btn-row">
            <button class="btn green" onclick="saveInvoice()">✓ حفظ الفاتورة</button>
            <button class="btn-outline" onclick="showInvForm=false;renderInvoices()">إلغاء</button>
          </div>
        </div>
      </div>
    </div>`:''}
    <div class="search-row">
      <input type="text" style="flex:1;border:1px solid #D5D8DC;border-radius:6px;padding:8px 10px;" placeholder="🔍 بحث..." value="${invSearch}" oninput="invSearch=this.value;renderInvoices()">
      ${!showInvForm?`<button class="btn green" onclick="showInvForm=true;invLines=[{id:uid(),productId:'',productName:'',qty:1,price:0,discount:0,bonus:0}];renderInvoices()">+ فاتورة جديدة</button>`:''}
    </div>
    ${filtered.length===0?'<div class="empty">لا توجد فواتير</div>':`<div class="card tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}`;
}

function addLine(){invLines.push({id:uid(),productId:'',productName:'',qty:1,price:0,discount:0,bonus:0});renderInvoices();}
function removeLine(id){invLines=invLines.filter(l=>l.id!==id);renderInvoices();}
function updateLine(id,field,value){
  invLines=invLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||''};}
    return {...l,[field]:['qty','price','discount','bonus'].includes(field)?Number(value):value};
  });
  // نحفظ اختيار العميل والتاريخ قبل الرندر
  const savedClient=document.getElementById('inv_client')?.value;
  const savedDate=document.getElementById('inv_date')?.value;
  renderInvoices();
  if(savedClient) document.getElementById('inv_client').value=savedClient;
  if(savedDate) document.getElementById('inv_date').value=savedDate;
}

function saveInvoice(){
  const clientId=document.getElementById('inv_client')?.value;
  const date=document.getElementById('inv_date')?.value||today();
  if(!clientId){alert('اختر عميل');return;}
  if(invLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}
  const total=invLines.reduce((s,l)=>{
    const afterDiscount=Number(l.price)*(1-(Number(l.discount)||0)/100);
    return s+(Number(l.qty)*afterDiscount);
  },0);
  const inv={id:uid(),number:invoices.length+1,clientId,date,lines:invLines.map(l=>({...l,qty:Number(l.qty),price:Number(l.price),discount:Number(l.discount||0),bonus:Number(l.bonus||0)})),total,createdAt:new Date().toISOString()};
  invoices.push(inv);
  // خصم الكمية الفعلية + البونص من المخزن
  invLines.forEach(l=>{
    if(l.productId){
      const totalQty=Number(l.qty)+(Number(l.bonus)||0);
      movements.push({id:uid(),productId:l.productId,type:'out',qty:totalQty,date,note:'فاتورة #'+inv.number+(l.bonus>0?` (${l.qty} مبيعات + ${l.bonus} بونص)`:``),invoiceId:inv.id});
    }
  });
  save();showInvForm=false;invLines=[{id:uid(),productId:'',productName:'',qty:1,price:0,discount:0,bonus:0}];renderInvoices();
}

function deleteInvoice(id){
  if(!confirm('هتحذف الفاتورة دي؟'))return;
  invoices=invoices.filter(i=>i.id!==id);
  movements=movements.filter(m=>m.invoiceId!==id);
  save();renderInvoices();
}

function shareInvoice(invId){
  const inv=invoices.find(i=>i.id===invId);
  if(!inv)return;
  const c=clients.find(c=>c.id===inv.clientId);
  let msg=`🐔 *فاتورة رقم #${inv.number}*\n`;
  msg+=`━━━━━━━━━━━━━━\n`;
  msg+=`👤 العميل: ${c?.name||'—'}\n`;
  msg+=`📅 التاريخ: ${inv.date}\n`;
  msg+=`━━━━━━━━━━━━━━\n`;
  inv.lines.forEach(l=>{
    const pName=l.productName||stock.find(p=>p.id===l.productId)?.name||'—';
    const afterDiscount=l.price*(1-(l.discount||0)/100);
    const lineTotal=l.qty*afterDiscount;
    msg+=`📦 ${pName}\n`;
    msg+=`   ${l.qty} × ${fmt(l.price)} ج`;
    if(l.discount>0) msg+=` (خصم ${l.discount}%)`;
    if(l.bonus>0) msg+=` + ${l.bonus} هدية`;
    msg+=`\n   = ${fmt(lineTotal)} ج\n`;
  });
  msg+=`━━━━━━━━━━━━━━\n`;
  msg+=`💰 *الإجمالي: ${fmt(inv.total)} جنيه*\n`;
  msg+=`━━━━━━━━━━━━━━`;
  window.open('https://wa.me/?text='+encodeURIComponent(msg),'_blank');
}

function renderInvDetail(){
  const inv=invoices.find(i=>i.id===invDetailId);
  if(!inv){invDetailId=null;renderInvoices();return;}
  const c=clients.find(c=>c.id===inv.clientId);
  const rows=inv.lines.map(l=>{
    const pName=l.productName||stock.find(p=>p.id===l.productId)?.name||l.productId;
    const afterDiscount=l.price*(1-(l.discount||0)/100);
    const lineTotal=l.qty*afterDiscount;
    const extras=[];
    if(l.discount>0) extras.push(`خصم ${l.discount}%`);
    if(l.bonus>0) extras.push(`🎁 ${l.bonus} هدية`);
    return `<tr>
      <td>${pName}${extras.length>0?'<br><small style="color:#D68910">'+extras.join(' | ')+'</small>':''}</td>
      <td>${l.qty}</td><td>${fmt(l.price)}</td><td>${fmt(lineTotal)}</td>
    </tr>`;
  }).join('');
  document.getElementById('tab-invoices').innerHTML=`
    <div class="back-row">
      <button class="btn gray" onclick="goBackFromInvDetail()">← رجوع</button>
      <div class="page-title">فاتورة #${inv.number}</div>
    </div>
    <div class="card">
      <div class="card-body">
        <div style="margin-bottom:10px"><strong>العميل:</strong> ${c?.name||'—'}</div>
        <div style="margin-bottom:10px"><strong>التاريخ:</strong> ${inv.date}</div>
        <div class="tbl-wrap"><table><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table></div>
        <div style="text-align:left;margin-top:12px;font-weight:bold;font-size:16px;color:#1A5276">الإجمالي: ${fmt(inv.total)} جنيه</div>
        <div class="btn-row" style="margin-top:12px">
          <button class="btn purple" onclick="shareInvoice('${inv.id}')">📲 مشاركة نصية واتساب</button>
        </div>
      </div>
    </div>`;
}

    const c=clients.find(c=>c.id===p.clientId);

    ${showPayForm?`

        <div class="form-row">
          <div class="form-group"><div class="lbl">العميل *</div>
            <select id="pay_client" onchange="renderPayClientInvoices()"><option value="">— اختر عميل —</option>${clientOpts}</select>
          </div>
        </div>
        <div id="pay_inv_row"></div>
        <div class="form-row">

          <div class="form-group"><div class="lbl">التاريخ</div><input type="date" id="pay_date" value="${today()}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">ملاحظة</div><input type="text" id="pay_note" placeholder="كاش / شيك / تحويل..."></div>

        <div class="btn-row">
          <button class="btn green" onclick="savePayment()">✓ تسجيل</button>
          <button class="btn-outline" onclick="showPayForm=false;renderPayments()">إلغاء</button>
        </div>

    </div>`:''}

    ${sorted.length===0?'<div class="empty">لا توجد مدفوعات</div>':`<div class="card tbl-wrap"><table><thead><tr><th>العميل</th><th>التاريخ</th><th>المبلغ</th><th>ملاحظة</th></tr></thead><tbody>${rows}</tbody></table></div>`}`;
}

function renderPayClientInvoices(){
  const cid=document.getElementById('pay_client')?.value;
  if(!cid){document.getElementById('pay_inv_row').innerHTML='';return;}
  const cInvoices=invoices.filter(i=>i.clientId===cid);
  if(cInvoices.length===0){document.getElementById('pay_inv_row').innerHTML='';return;}
  const opts=cInvoices.map(i=>`<option value="${i.id}">فاتورة #${i.number} — ${fmt(i.total)} ج (${i.date})</option>`).join('');
  document.getElementById('pay_inv_row').innerHTML=`<div class="form-row"><div class="form-group"><div class="lbl">ربط بفاتورة (اختياري)</div><select id="pay_invoice"><option value="">— عام على الحساب —</option>${opts}</select></div></div>`;

function savePayment(){
  const clientId=document.getElementById('pay_client')?.value;
  const amount=Number(document.getElementById('pay_amount')?.value||0);
  const date=document.getElementById('pay_date')?.value||today();
  const note=document.getElementById('pay_note')?.value||'';
  const invoiceId=document.getElementById('pay_invoice')?.value||null;
  if(!clientId||!amount){alert('اختر عميل وأدخل المبلغ');return;}
  payments.push({id:uid(),clientId,invoiceId,amount,date,note});
  save();showPayForm=false;renderPayments();
}

let showRetForm=false;
let retLines=[{id:uid(),productId:'',productName:'',qty:1,price:0}];

function renderReturns(){
  if(retDetailId){renderReturnDetail();return;}
  const sorted=[...returns].sort((a,b)=>b.date.localeCompare(a.date));
  const clientOpts=clients.map(c=>`<option value="${c.id}">${c.name}</option>`).join('');

    const c=clients.find(c=>c.id===r.clientId);

      <td>${r.number}</td><td>${c?.name||'—'}</td><td>${r.date}</td>
      <td style="font-weight:bold;color:#1E8449">${fmt(r.total)} ج</td>

  let linesHtml=retLines.map(l=>{
    const stockOpts=stock.length>0

          ${stock.length>0
            ?`<select onchange="updateRetLine('${l.id}','productId',this.value)">${stockOpts}</select>`
            :`<input type="text" value="${l.productName}" placeholder="اسم المنتج" onchange="updateRetLine('${l.id}','productName',this.value)">`}
        </div>
        <div class="form-group">
          <div class="lbl">الكمية</div>
          <input type="number" min="1" value="${l.qty}" onchange="updateRetLine('${l.id}','qty',this.value)">
        </div>
        <div class="form-group">
          <div class="lbl">السعر (ج)</div>
          <input type="number" min="0" value="${l.price}" onchange="updateRetLine('${l.id}','price',this.value)">
        </div>
        <div class="form-group" style="flex:0;min-width:70px">
          <div class="lbl">الإجمالي</div>
          <div style="padding:8px 0;font-weight:bold;color:#1E8449">${fmt(l.qty*l.price)}</div>
        </div>
        ${retLines.length>1?`<button class="btn red" style="padding:6px 10px;align-self:flex-end" onclick="removeRetLine('${l.id}')">✕</button>`:''}
      </div>
    </div>`;
  }).join('');

  const total=retLines.reduce((s,l)=>s+(Number(l.qty)*Number(l.price)),0);

  document.getElementById('tab-returns').innerHTML=`
    ${showRetForm?`
    <div class="card">
      <div class="card-head green">↩️ تسجيل مرتجع جديد</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group" style="flex:2">
            <div class="lbl">العميل *</div>
            <select id="ret_client"><option value="">— اختر عميل —</option>${clientOpts}</select>
          </div>
          <div class="form-group">
            <div class="lbl">التاريخ</div>
            <input type="date" id="ret_date" value="${today()}">
          </div>
        </div>
        <div class="divider"></div>
        <div class="section-title">📦 أصناف المرتجع</div>
        ${linesHtml}
        <button class="btn-outline" style="margin-bottom:10px" onclick="addRetLine()">+ إضافة صنف</button>
        <div class="divider"></div>
        <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
          <div style="font-weight:bold;font-size:16px;color:#1E8449">إجمالي المرتجع: ${fmt(total)} جنيه</div>
          <div class="btn-row">
            <button class="btn green" onclick="saveReturn()">✓ حفظ المرتجع</button>
            <button class="btn-outline" onclick="showRetForm=false;renderReturns()">إلغاء</button>
          </div>
        </div>
      </div>
    </div>`:''}
    <div class="search-row">
      ${!showRetForm?`<button class="btn green" onclick="showRetForm=true;retLines=[{id:uid(),productId:'',productName:'',qty:1,price:0}];renderReturns()">+ مرتجع جديد</button>`:''}
    </div>
    ${sorted.length===0?'<div class="empty">لا توجد مرتجعات</div>':`<div class="card tbl-wrap"><table><thead><tr><th>#</th><th>العميل</th><th>التاريخ</th><th>الإجمالي</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}
  `;
}

function addRetLine(){retLines.push({id:uid(),productId:'',productName:'',qty:1,price:0});renderReturns();}
function removeRetLine(id){retLines=retLines.filter(l=>l.id!==id);renderReturns();}
function updateRetLine(id,field,value){
  retLines=retLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||''};}
    return {...l,[field]:['qty','price'].includes(field)?Number(value):value};
  });
  const savedClient=document.getElementById('ret_client')?.value;
  const savedDate=document.getElementById('ret_date')?.value;
  renderReturns();
  if(savedClient) document.getElementById('ret_client').value=savedClient;
  if(savedDate) document.getElementById('ret_date').value=savedDate;
}

function saveReturn(){
  const clientId=document.getElementById('ret_client')?.value;
  const date=document.getElementById('ret_date')?.value||today();
  if(!clientId){alert('اختر عميل');return;}
  if(retLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}
  const total=retLines.reduce((s,l)=>s+(Number(l.qty)*Number(l.price)),0);
  const ret={id:uid(),number:returns.length+1,clientId,date,lines:retLines.map(l=>({...l,qty:Number(l.qty),price:Number(l.price)})),total,createdAt:new Date().toISOString()};
  returns.push(ret);
  // المرتجع بيرجع للمخزن (وارد)
  retLines.forEach(l=>{
    if(l.productId) movements.push({id:uid(),productId:l.productId,type:'in',qty:Number(l.qty),date,note:'مرتجع #'+ret.number,returnId:ret.id});
  });
  save();
  showRetForm=false;
  retLines=[{id:uid(),productId:'',productName:'',qty:1,price:0}];
  renderReturns();
}

function deleteReturn(id){
  if(!confirm('هتحذف المرتجع ده؟'))return;
  returns=returns.filter(r=>r.id!==id);
  movements=movements.filter(m=>m.returnId!==id);
  save();renderReturns();
}

// ===== STOCK =====
let stockSubTab='overview';
let stockDetailId=null;
let showProductForm=false;
let showMovForm=false;
let currentMovType='in';

function renderStock(){
  if(stockDetailId){renderStockDetail();return;}
  document.getElementById('tab-stock').innerHTML=`
    <div class="sub-tabs">
      <button class="btn ${stockSubTab==='overview'?'blue':'btn-outline'}" onclick="stockSubTab='overview';renderStock()">📦 المنتجات</button>
      <button class="${stockSubTab==='movements'?'btn blue':'btn-outline'}" onclick="stockSubTab='movements';renderStock()">🔄 الحركات</button>
    </div>
    <div id="stock-content"></div>`;
  if(stockSubTab==='overview')renderStockOverview();
  else renderStockMovements();
}

function renderStockOverview(){
  const productOpts=stock.map(p=>`<option value="${p.id}">${p.name} (${stockQty(p.id)} ${p.unit})</option>`).join('');
  let items=stock.map(p=>{
    const qty=stockQty(p.id);
    const qtyColor=qty<10?'#C0392B':'#1E8449';
    return `<div class="list-item">
      <div class="list-item-head">
        <div><div class="list-item-name">${p.name}</div><div class="list-item-sub">وحدة: ${p.unit}</div></div>
        <div class="list-item-bal"><div class="list-item-bal-num" style="color:${qtyColor};font-size:20px">${qty}</div><div class="list-item-bal-lbl">${p.unit}</div></div>
      </div>
      <div class="list-item-actions">
        <button class="btn-sm blue" onclick="stockDetailId='${p.id}';renderStock()">📋 الحركات</button>
        <button class="btn-sm red" onclick="deleteProduct('${p.id}')">🗑 حذف</button>
      </div>
    </div>`;
  }).join('');
  document.getElementById('stock-content').innerHTML=`
    ${showProductForm?`
    <div class="card">
      <div class="card-head green">إضافة منتج جديد</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group" style="flex:2"><div class="lbl">اسم المنتج *</div><input type="text" id="p_name" placeholder="اسم الدواء / المنتج"></div>
          <div class="form-group"><div class="lbl">الوحدة / الوزن</div>
            <input type="text" id="p_unit" placeholder="مثال: 100 مل، كجم، لتر...">
          </div>
        </div>
        <div class="btn-row">
          <button class="btn green" onclick="addProduct()">+ إضافة</button>
          <button class="btn-outline" onclick="showProductForm=false;renderStock()">إلغاء</button>
        </div>
      </div>
    </div>`:''}
    ${showMovForm?`
    <div class="card">
      <div class="card-head">تسجيل حركة مخزن</div>
      <div class="card-body">
        <div class="form-row">
          <div class="form-group"><div class="lbl">النوع</div>
            <div style="display:flex;gap:6px">
              <button class="btn ${currentMovType==='in'?'green':'btn-outline'}" onclick="currentMovType='in';renderStock()">وارد ↓</button>
              <button class="${currentMovType==='out'?'btn red':'btn-outline'}" onclick="currentMovType='out';renderStock()">صادر ↑</button>
            </div>
          </div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">المنتج *</div><select id="mov_product"><option value="">— اختر منتج —</option>${productOpts}</select></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">الكمية *</div><input type="number" id="mov_qty" min="1" placeholder="0"></div>
          <div class="form-group"><div class="lbl">التاريخ</div><input type="date" id="mov_date" value="${today()}"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">ملاحظة</div><input type="text" id="mov_note" placeholder="ملاحظة اختيارية"></div>
        </div>
        <div class="btn-row">
          <button class="btn ${currentMovType==='in'?'green':'red'}" onclick="saveMovement()">✓ تسجيل</button>
          <button class="btn-outline" onclick="showMovForm=false;renderStock()">إلغاء</button>
        </div>
      </div>
    </div>`:''}
    <div class="btn-row" style="margin-bottom:10px">
      ${!showProductForm?`<button class="btn blue" onclick="showProductForm=true;renderStock()">+ منتج جديد</button>`:''}
      ${!showMovForm?`<button class="btn green" onclick="showMovForm=true;renderStock()">+ حركة مخزن</button>`:''}
    </div>
    ${stock.length===0?'<div class="empty">لا توجد منتجات. أضف منتجاتك أولاً.</div>':items}`;
}

function addProduct(){
  const name=document.getElementById('p_name')?.value.trim();
  const unit=document.getElementById('p_unit')?.value||'وحدة';
  if(!name){alert('أدخل اسم المنتج');return;}
  stock.push({id:uid(),name,unit});
  save();showProductForm=false;renderStock();
}
function deleteProduct(id){
  if(!confirm('هتحذف المنتج ده؟'))return;
  stock=stock.filter(p=>p.id!==id);
  movements=movements.filter(m=>m.productId!==id);
  save();renderStock();
}
function saveMovement(){
  const productId=document.getElementById('mov_product')?.value;
  const qty=Number(document.getElementById('mov_qty')?.value||0);
  const date=document.getElementById('mov_date')?.value||today();
  const note=document.getElementById('mov_note')?.value||'';
  if(!productId||!qty){alert('اختر منتج وأدخل الكمية');return;}
  if(currentMovType==='out'&&stockQty(productId)<qty){alert('الكمية المتاحة '+stockQty(productId)+' فقط');return;}
  movements.push({id:uid(),productId,type:currentMovType,qty,date,note});
  save();showMovForm=false;renderStock();
}

function renderStockMovements(){
  const sorted=[...movements].sort((a,b)=>b.date.localeCompare(a.date));
  const rows=sorted.map(m=>{
    const p=stock.find(p=>p.id===m.productId);
    return `<tr><td>${p?.name||'—'}</td><td>${m.date}</td>
      <td><span class="badge ${m.type==='in'?'green':'red'}">${m.type==='in'?'وارد':'صادر'}</span></td>
      <td style="font-weight:bold">${m.qty}</td><td>${m.note||'—'}</td></tr>`;
  }).join('');
  document.getElementById('stock-content').innerHTML=`
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px">
      <button class="btn green" onclick="stockSubTab='overview';showMovForm=true;renderStock()">+ حركة جديدة</button>
    </div>
    ${sorted.length===0?'<div class="empty">لا توجد حركات</div>':`<div class="card tbl-wrap"><table><thead><tr><th>المنتج</th><th>التاريخ</th><th>النوع</th><th>الكمية</th><th>ملاحظة</th></tr></thead><tbody>${rows}</tbody></table></div>`}`;
}

function renderStockDetail(){
  const p=stock.find(p=>p.id===stockDetailId);
  if(!p){stockDetailId=null;renderStock();return;}
  const moves=movements.filter(m=>m.productId===stockDetailId).sort((a,b)=>b.date.localeCompare(a.date));
  const totalIn=moves.filter(m=>m.type==='in').reduce((s,m)=>s+m.qty,0);
  const totalOut=moves.filter(m=>m.type==='out').reduce((s,m)=>s+m.qty,0);
  const rows=moves.map(m=>`<tr>
    <td>${m.date}</td>
    <td><span class="badge ${m.type==='in'?'green':'red'}">${m.type==='in'?'وارد ↓':'صادر ↑'}</span></td>
    <td style="font-weight:bold">${m.qty}</td><td>${m.note||'—'}</td>
  </tr>`).join('');
  document.getElementById('tab-stock').innerHTML=`
    <div class="back-row">
      <button class="btn gray" onclick="stockDetailId=null;renderStock()">← رجوع</button>
      <div class="page-title">حركة مخزن: ${p.name}</div>
    </div>
    <div class="summary">
      <div class="sum-card blue"><div class="sum-num">${stockQty(p.id)}</div><div class="sum-lbl">الرصيد الحالي (${p.unit})</div></div>
      <div class="sum-card green"><div class="sum-num">${totalIn}</div><div class="sum-lbl">إجمالي الوارد</div></div>
      <div class="sum-card red"><div class="sum-num">${totalOut}</div><div class="sum-lbl">إجمالي الصادر</div></div>
    </div>
    <div class="card">
      <div class="card-head">📋 سجل الحركات</div>
      ${moves.length===0?'<div class="empty">لا توجد حركات</div>':`<div class="tbl-wrap"><table><thead><tr><th>التاريخ</th><th>النوع</th><th>الكمية</th><th>ملاحظة</th></tr></thead><tbody>${rows}</tbody></table></div>`}
    </div>`;
}

// ===== BACKUP =====
function exportData(){
  const data={clients,invoices,payments,stock,movements,returns,exportDate:new Date().toISOString()};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='نسخة_احتياطية_'+today()+'.json';a.click();
  URL.revokeObjectURL(url);
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.clients||!data.invoices){alert('الملف مش صح!');return;}
        if(!confirm('هيتم استبدال كل البيانات الحالية بالنسخة دي. متأكد؟'))return;
        clients=data.clients||[];invoices=data.invoices||[];payments=data.payments||[];stock=data.stock||[];movements=data.movements||[];
        if(Array.isArray(data.returns)){returns=data.returns;}else{alert('⚠️ ملاحظة: الملف ده نسخة قديمة ومش فيه بيانات المرتجع — بيانات المرتجع الموجودة على الجهاز هتفضل زي ما هي.');}
        save();alert('✅ تم استيراد البيانات بنجاح!');render();
      }catch(err){alert('حصل خطأ في قراءة الملف!');}
    };
    reader.readAsText(file);
  };
  input.click();
}

// ===== ACTIVATION SYSTEM =====
function initActivation(){
  // توليد كود الجهاز — بيتخزن مرة واحدة في الجهاز ده بس
  let dCode = DB.get('_dc');
  if(!dCode){
    dCode = Math.floor(1000 + Math.random() * 9000);
    DB.set('_dc', dCode);
  }

  // فحص لو الجهاز ده مفعّل
  const activated = DB.get('_ak');
  if(activated && _vk(dCode, activated)){
    // مفعّل — شغّل البرنامج عادي
    render();
    return;
  }

  // مش مفعّل — وقف البرنامج وعرض شاشة التفعيل
  const header = document.querySelector('.header');
  const tabs = document.querySelector('.tabs');
  const body = document.querySelector('.body');
  const wm = document.querySelector('.watermark');
  if(header) header.style.display='none';
  if(tabs) tabs.style.display='none';
  if(body) body.style.display='none';
  if(wm) wm.style.display='none';

  // شاشة التفعيل
  const lockScreen = document.createElement('div');
  lockScreen.id = 'lockScreen';
  lockScreen.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(135deg,#1A5276,#1E8449);
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:99999;padding:30px;
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#fff;text-align:center;
    -webkit-overflow-scrolling:touch;overflow-y:auto;
  `;
  lockScreen.innerHTML = `
    <div style="font-size:50px;margin-bottom:16px;">🔒</div>
    <div style="font-size:20px;font-weight:bold;margin-bottom:8px;">مدير المندوب البيطري المتكامل</div>
    <div style="font-size:13px;opacity:.85;margin-bottom:28px;">النسخة غير مفعّلة</div>
    <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:20px 24px;margin-bottom:24px;width:100%;max-width:320px;">
      <div style="font-size:13px;opacity:.9;margin-bottom:10px;">أرسل كود الجهاز التالي للمبرمج على واتساب للحصول على كود التفعيل:</div>
      <div style="font-size:36px;font-weight:bold;letter-spacing:8px;color:#FFD700;">${dCode}</div>
      <div style="font-size:11px;opacity:.7;margin-top:6px;">كود الجهاز</div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:20px;width:100%;max-width:320px;">
      <input id="serialInput" type="number" placeholder="أدخل كود التفعيل" style="
        flex:1;padding:12px;border-radius:8px;border:2px solid rgba(255,255,255,.4);
        background:rgba(255,255,255,.1);color:#fff;font-size:16px;text-align:center;
        outline:none;direction:ltr;-webkit-appearance:none;
      ">
    </div>
    <button onclick="_activate(${dCode})" style="
      background:#FFD700;color:#1A5276;border:none;border-radius:8px;
      padding:14px 40px;font-size:16px;font-weight:bold;cursor:pointer;
      width:100%;max-width:320px;-webkit-appearance:none;
    ">✓ تفعيل</button>
    <div id="activationMsg" style="margin-top:14px;font-size:13px;min-height:20px;"></div>
    <div style="margin-top:30px;font-size:12px;opacity:.7;">
      للتفعيل تواصل مع المبرمج على واتساب<br>
      <strong>01552623744</strong>
    </div>
  `;
  document.body.appendChild(lockScreen);
  window._appLocked = true;
}

document.addEventListener('DOMContentLoaded', function(){
  initActivation();
  // إزالة شاشة الترحيب من الصفحة بعد ما تختفي
  setTimeout(()=>{
    const splash=document.getElementById('splashScreen');
    if(splash) splash.remove();
  },2700);
});

// دالة التحقق من السيريال — المعادلة مخفية هنا
function _vk(c,k){
  const _a='\x36\x35',_b='\x31\x33',_c='\x34\x35\x37',_d='\x39\x31';
  const _x=c,_y=Number(_b),_z=Number(_c),_w=Number(_d);
  const _p=(_x*_y+_z)*3-_w;
  return Number(k)===_p;
}

// دالة التفعيل
function _activate(dCode){
  const serial = document.getElementById('serialInput').value.trim();
  const msg = document.getElementById('activationMsg');
  if(!serial){
    msg.style.color='#FFD700';
    msg.textContent='من فضلك أدخل كود التفعيل';
    return;
  }
  if(_vk(dCode, serial)){
    DB.set('_ak', serial);
    msg.style.color='#90EE90';
    msg.textContent='✅ تم التفعيل بنجاح! جاري الفتح...';
    setTimeout(()=>{
      document.getElementById('lockScreen').remove();
      document.querySelector('.header').style.display='';
      document.querySelector('.tabs').style.display='';
      document.querySelector('.body').style.display='';
      document.querySelector('.watermark').style.display='';
      render();
    },1500);
  } else {
    msg.style.color='#FF6B6B';
    msg.textContent='❌ كود التفعيل غير صحيح';
  }
}
</script>
