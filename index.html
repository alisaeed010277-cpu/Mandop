<script>
// ============================================================
// IndexedDB wrapper — بيستحمل جيجابايت بدل 5MB
// ============================================================
const DB_NAME='vsApp';const DB_VER=1;const STORE='kvStore';
let _idb=null;

function openIDB(){
  return new Promise((res,rej)=>{
    if(_idb){res(_idb);return;}
    const req=indexedDB.open(DB_NAME,DB_VER);
    req.onupgradeneeded=e=>{e.target.result.createObjectStore(STORE,{keyPath:'k'});};
    req.onsuccess=e=>{_idb=e.target.result;res(_idb);};
    req.onerror=e=>rej(e);
  });
}

function idbGet(key){
  return openIDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readonly');
    const req=tx.objectStore(STORE).get(key);
    req.onsuccess=()=>res(req.result?req.result.v:null);
    req.onerror=e=>rej(e);
  }));
}

function idbSet(key,val){
  return openIDB().then(db=>new Promise((res,rej)=>{
    const tx=db.transaction(STORE,'readwrite');
    tx.objectStore(STORE).put({k:key,v:val});
    tx.oncomplete=()=>res();
    tx.onerror=e=>rej(e);
  }));
}

// للتفعيل والإعدادات — بيفضل localStorage (بيانات صغيرة جداً)
const DB={
  get:(k)=>{try{return JSON.parse(localStorage.getItem(k)||'null');}catch{return null;}},

};

// ====== مكوّن قائمة بحث قابلة لإعادة الاستخدام (searchable select) ======
// options: [{id,label,sub}]  — بيولّد حقل نص + حقل مخفي بنفس الـ fieldId (زي ما كانت select عادية)
let _sselData={};
function searchableSelectHtml(fieldId, options, placeholder, selectedId, onPickExtra){
  _sselData[fieldId]={options, onPickExtra: onPickExtra||''};
  const sel=options.find(o=>o.id===selectedId);
  return `<div class="ssel-wrap">
    <input type="text" class="ssel-input" id="${fieldId}_search" placeholder="${placeholder}" autocomplete="off"
      value="${sel?sel.label.replace(/"/g,'&quot;'):''}"
      oninput="_sselFilter('${fieldId}')" onfocus="_sselFilter('${fieldId}')"
      onblur="setTimeout(()=>{const l=document.getElementById('${fieldId}_list');if(l)l.style.display='none';},200)">
    <input type="hidden" id="${fieldId}" value="${selectedId||''}">
    <div class="ssel-list" id="${fieldId}_list"></div>
  </div>`;
}
function _sselFilter(fieldId){
  const data=_sselData[fieldId];
  if(!data)return;
  const q=(document.getElementById(fieldId+'_search')?.value||'').trim();
  const list=document.getElementById(fieldId+'_list');
  if(!list)return;
  const matches=q?data.options.filter(o=>o.label.includes(q)):data.options;
  if(matches.length===0){
    list.innerHTML=`<div class="ssel-empty">لا توجد نتائج</div>`;
  }else{
    list.innerHTML=matches.slice(0,100).map(o=>`<div class="ssel-item" onmousedown="_sselPick('${fieldId}','${o.id}')"><div>${o.label}</div>${o.sub?`<div class="sub">${o.sub}</div>`:''}</div>`).join('');
  }
  list.style.display='block';
}
function _sselPick(fieldId, optId){
  const data=_sselData[fieldId];
  if(!data)return;
  const opt=data.options.find(o=>o.id===optId);
  if(!opt)return;
  const hidden=document.getElementById(fieldId);
  const search=document.getElementById(fieldId+'_search');
  const list=document.getElementById(fieldId+'_list');
  if(hidden)hidden.value=opt.id;
  if(search)search.value=opt.label;
  if(list)list.style.display='none';
  if(data.onPickExtra)(new Function(data.onPickExtra))();
}

  expenses=exp||[];

  // تحديث تلقائي مرة واحدة: تصحيح تسميات الحركات القديمة في المخزن لتوضيح مبيعات/مشتريات
  let migrated=false;
  movements=movements.map(mv=>{
    if(typeof mv.note==='string'){
      if(mv.note.startsWith('فاتورة #')){migrated=true;return {...mv,note:mv.note.replace('فاتورة #','ف.مبيعات #')};}
      if(mv.note.startsWith('مشتريات #')){migrated=true;return {...mv,note:mv.note.replace('مشتريات #','ف.مشتريات #')};}
      if(mv.note.startsWith('مرتجع #')){migrated=true;return {...mv,note:mv.note.replace('مرتجع #','مردود مبيعات #')};}
    }
    return mv;
  });
  if(migrated) save();

  if(!c && clients.length>0){
    save();
    [KEYS.clients,KEYS.invoices,KEYS.payments,KEYS.stock,KEYS.movements,KEYS.returns].forEach(k=>localStorage.removeItem(k));

}

const clientBalance=(cid)=>{
  const c=clients.find(c=>c.id===cid);
  const opening=Number(c?.opening||0);
  const total=invoices.filter(i=>i.clientId===cid).reduce((s,i)=>s+i.total,0);
  const paid=payments.filter(p=>p.clientId===cid).reduce((s,p)=>s+p.amount,0);
  const ret=returns.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.total,0);
  return opening+total-paid-ret;
};
// أعمار الديون: يوزّع أرصدة العميل (الرصيد الافتتاحي + الفواتير) على أعمارها بالأيام
// بطريقة FIFO (المدفوعات والمرتجعات بتقفل أقدم المستحقات الأول)
function clientAgingBuckets(cid, asOf){
  const c=clients.find(c=>c.id===cid);
  if(!c) return null;
  const debits=[];
  if(Number(c.opening||0)>0) debits.push({date:c.openingDate||c.createdAt?.slice(0,10)||today(),amount:Number(c.opening)});
  invoices.filter(i=>i.clientId===cid).forEach(i=>debits.push({date:i.date,amount:i.total}));
  debits.sort((a,b)=>a.date.localeCompare(b.date));
  let creditPool=payments.filter(p=>p.clientId===cid).reduce((s,p)=>s+p.amount,0)
                +returns.filter(r=>r.clientId===cid).reduce((s,r)=>s+r.total,0);
  const asOfDate=new Date(asOf||today());
  const buckets=[0,0,0,0,0,0,0]; // 0-30,31-60,61-90,91-120,121-150,151-180,>180
  debits.forEach(d=>{
    let remaining=d.amount;
    if(creditPool>0){
      const applied=Math.min(creditPool, remaining);
      remaining-=applied;
      creditPool-=applied;
    }
    if(remaining<=0) return;
    const days=Math.floor((asOfDate-new Date(d.date))/86400000);
    let idx;
    if(days<=30) idx=0; else if(days<=60) idx=1; else if(days<=90) idx=2;
    else if(days<=120) idx=3; else if(days<=150) idx=4; else if(days<=180) idx=5; else idx=6;
    buckets[idx]+=remaining;
  });
  const total=buckets.reduce((s,b)=>s+b,0);
  return {client:c,buckets,total};
}
function agingReportRows(asOf){
  return clients.map(c=>clientAgingBuckets(c.id,asOf)).filter(r=>r&&r.total>0.01).sort((a,b)=>b.total-a.total);
}
const stockQty=(pid)=>movements.filter(m=>m.productId===pid).reduce((s,m)=>m.type==='in'?s+m.qty:s-m.qty,0);
// بيجيب الكميات مقسمة على تواريخ الصلاحية
const stockBatches=(pid)=>{
  const batches={};
  movements.filter(m=>m.productId===pid).forEach(m=>{
    const key=m.expiry||'—';
    if(!batches[key]) batches[key]=0;
    batches[key]+=m.type==='in'?m.qty:-m.qty;
  });
  return Object.entries(batches).filter(([k,v])=>v>0).sort((a,b)=>a[0].localeCompare(b[0]));
};

function _handleLogoUpload(input){
  const file=input.files && input.files[0];
  if(!file)return;
  const reader=new FileReader();
  reader.onload=function(e){
    const img=new Image();
    img.onload=function(){
      const maxSize=150;
      let w=img.width, h=img.height;
      if(w>h){ if(w>maxSize){h=Math.round(h*maxSize/w); w=maxSize;} }
      else{ if(h>maxSize){w=Math.round(w*maxSize/h); h=maxSize;} }
      const canvas=document.createElement('canvas');
      canvas.width=w; canvas.height=h;
      const ctx=canvas.getContext('2d');
      ctx.drawImage(img,0,0,w,h);
      _tempLogoDataUrl=canvas.toDataURL('image/jpeg',0.85);
      const prev=document.getElementById('logoPreview');
      if(prev){ prev.src=_tempLogoDataUrl; prev.style.display='inline-block'; }
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}

let homeFromDate='',homeToDate='';
function clientSummaryData(from,to){
  const rows=clients.map(c=>{
    let opening=Number(c.opening||0);
    if(from){
      opening+=invoices.filter(i=>i.clientId===c.id&&i.date<from).reduce((s,i)=>s+i.total,0);
      opening-=payments.filter(p=>p.clientId===c.id&&p.date<from).reduce((s,p)=>s+p.amount,0);
      opening-=returns.filter(r=>r.clientId===c.id&&r.date<from).reduce((s,r)=>s+r.total,0);
    }
    const sales=invoices.filter(i=>i.clientId===c.id&&(!from||i.date>=from)&&(!to||i.date<=to)).reduce((s,i)=>s+i.total,0);
    const paid=payments.filter(p=>p.clientId===c.id&&(!from||p.date>=from)&&(!to||p.date<=to)).reduce((s,p)=>s+p.amount,0);
    const ret=returns.filter(r=>r.clientId===c.id&&(!from||r.date>=from)&&(!to||r.date<=to)).reduce((s,r)=>s+r.total,0);
    const bal=opening+sales-ret-paid;
    return {client:c,opening,sales,ret,paid,bal};
  });
  const totals=rows.reduce((t,r)=>({opening:t.opening+r.opening,sales:t.sales+r.sales,ret:t.ret+r.ret,paid:t.paid+r.paid,bal:t.bal+r.bal}),{opening:0,sales:0,ret:0,paid:0,bal:0});
  return {rows,totals};
}

function deleteClient(id){
  if(!confirm('هتحذف العميل ده وكل الفواتير والسداد والمرتجعات الخاصة بيه؟ الإجراء ده مينفعش يترجع.'))return;
  const clientInvoiceIds=invoices.filter(i=>i.clientId===id).map(i=>i.id);
  const clientReturnIds=returns.filter(r=>r.clientId===id).map(r=>r.id);
  movements=movements.filter(m=>!clientInvoiceIds.includes(m.invoiceId)&&!clientReturnIds.includes(m.returnId));
  invoices=invoices.filter(i=>i.clientId!==id);
  payments=payments.filter(p=>p.clientId!==id);
  returns=returns.filter(r=>r.clientId!==id);
  clients=clients.filter(c=>c.id!==id);
  save();renderClients();
}

// يحوّل محتوى المستند لصورة JPEG عالية الجودة عن طريق رسمه في SVG foreignObject ثم Canvas
async function renderDocToJpeg(title, bodyHtml){
  const logoSvg = `<svg xmlns="http://www.w3.org/2000/svg" width="60" height="60" viewBox="0 0 70 70"><defs><linearGradient id="pg2" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" style="stop-color:#FFD700"/><stop offset="100%" style="stop-color:#F39C12"/></linearGradient></defs><circle cx="35" cy="35" r="35" fill="url(#pg2)"/><text x="35" y="46" text-anchor="middle" font-family="Georgia,serif" font-size="26" font-weight="bold" fill="#1A5276" letter-spacing="2">AS</text></svg>`;
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-9999px;top:0;z-index:-1;width:760px;';
  holder.innerHTML=`<style>${DOC_STYLE}</style><div class="doc-wrap" id="_pdfDocRoot">${buildDocInnerHtml(title, bodyHtml, logoSvg)}</div>`;
  document.body.appendChild(holder);
  await new Promise(r=>setTimeout(r,60));
  const rootEl=holder.querySelector('#_pdfDocRoot');
  const w=rootEl.offsetWidth||760;
  const h=rootEl.offsetHeight||400;
  const serializer=new XMLSerializer();
  const styleStr=serializer.serializeToString(holder.querySelector('style'));
  const rootStr=serializer.serializeToString(rootEl);
  document.body.removeChild(holder);

  const svgStr=`<svg xmlns="http://www.w3.org/2000/svg" width="${w}" height="${h}"><foreignObject width="100%" height="100%"><div xmlns="http://www.w3.org/1999/xhtml">${styleStr}${rootStr}</div></foreignObject></svg>`;
  const svgDataUrl='data:image/svg+xml;charset=utf-8,'+encodeURIComponent(svgStr);

  const img=new Image();
  const loaded=new Promise((resolve,reject)=>{ img.onload=()=>resolve(); img.onerror=()=>reject(new Error('تعذر تجهيز صورة المستند')); });
  img.src=svgDataUrl;
  await loaded;

  const scale=2;
  const canvas=document.createElement('canvas');
  canvas.width=w*scale; canvas.height=h*scale;
  const ctx=canvas.getContext('2d');
  ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,canvas.width,canvas.height);
  ctx.drawImage(img,0,0,canvas.width,canvas.height);

  const blob=await new Promise(resolve=>canvas.toBlob(resolve,'image/jpeg',0.92));
  return {blob, cssWidth:w, cssHeight:h, pxWidth:canvas.width, pxHeight:canvas.height};
}

// بناء ملف PDF يدويًا (بدون أي مكتبة) بتضمين صورة المستند كصفحة واحدة
function buildPdfFromJpeg(jpegBytes, pxWidth, pxHeight, ptWidth, ptHeight){
  const encoder=new TextEncoder();
  const parts=[]; let offset=0; const offsets=[];
  function push(chunk){
    const bytes=(typeof chunk==='string')?encoder.encode(chunk):chunk;
    parts.push(bytes); offset+=bytes.length;
  }
  push('%PDF-1.4\n');
  offsets[1]=offset; push(`1 0 obj\n<< /Type /Catalog /Pages 2 0 R >>\nendobj\n`);
  offsets[2]=offset; push(`2 0 obj\n<< /Type /Pages /Kids [3 0 R] /Count 1 >>\nendobj\n`);
  offsets[3]=offset; push(`3 0 obj\n<< /Type /Page /Parent 2 0 R /Resources << /XObject << /Im0 4 0 R >> /ProcSet [/PDF /ImageC] >> /MediaBox [0 0 ${ptWidth.toFixed(2)} ${ptHeight.toFixed(2)}] /Contents 5 0 R >>\nendobj\n`);
  offsets[4]=offset; push(`4 0 obj\n<< /Type /XObject /Subtype /Image /Width ${pxWidth} /Height ${pxHeight} /ColorSpace /DeviceRGB /BitsPerComponent 8 /Filter /DCTDecode /Length ${jpegBytes.length} >>\nstream\n`);
  push(jpegBytes);
  push(`\nendstream\nendobj\n`);
  const contentStr=`q ${ptWidth.toFixed(2)} 0 0 ${ptHeight.toFixed(2)} 0 0 cm /Im0 Do Q`;
  offsets[5]=offset; push(`5 0 obj\n<< /Length ${contentStr.length} >>\nstream\n${contentStr}\nendstream\nendobj\n`);
  const xrefStart=offset;
  push(`xref\n0 6\n0000000000 65535 f \n`);
  for(let i=1;i<=5;i++){ push(String(offsets[i]).padStart(10,'0')+' 00000 n \n'); }
  push(`trailer\n<< /Size 6 /Root 1 0 R >>\nstartxref\n${xrefStart}\n%%EOF`);
  const total=parts.reduce((s,p)=>s+p.length,0);
  const out=new Uint8Array(total);
  let pos=0; for(const p of parts){ out.set(p,pos); pos+=p.length; }
  return new Blob([out],{type:'application/pdf'});
}

async function generateDocumentPdfBlob(title, bodyHtml){
  const {blob, cssWidth, cssHeight, pxWidth, pxHeight}=await renderDocToJpeg(title, bodyHtml);
  const jpegBytes=new Uint8Array(await blob.arrayBuffer());
  const ptWidth=cssWidth*0.75, ptHeight=cssHeight*0.75;
  const pdfBlob=buildPdfFromJpeg(jpegBytes, pxWidth, pxHeight, ptWidth, ptHeight);
  return {pdfBlob, jpegBlob:blob};
}

// نافذة معاينة المستند قبل الإرسال — بترجع Promise تتحل لما المستخدم يقفل النافذة (سواء بعت أو رجع)
function showPdfPreviewModal(jpegBlob, onConfirm){
  return new Promise((resolve)=>{
    const url=URL.createObjectURL(jpegBlob);
    const modal=document.createElement('div');
    modal.id='pdfPreviewModal';
    modal.style.cssText='position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:99999;display:flex;align-items:center;justify-content:center;padding:16px;';
    modal.innerHTML=`
      <div style="background:#fff;border-radius:14px;max-width:420px;width:100%;max-height:92vh;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.3)">
        <div style="padding:12px 16px;border-bottom:1px solid #D5D8DC;font-weight:bold;color:#1A5276;text-align:center">👁️ معاينة قبل الإرسال</div>
        <div style="overflow:auto;flex:1;background:#F2F3F4;padding:10px;display:flex;justify-content:center">
          <img src="${url}" style="width:100%;max-width:380px;border-radius:6px;box-shadow:0 2px 10px rgba(0,0,0,.15)">
        </div>
        <div style="display:flex;gap:8px;padding:12px 16px;border-top:1px solid #D5D8DC">
          <button id="pdfPreviewBack" style="flex:1;background:#EAECEE;color:#333;border:none;border-radius:8px;padding:12px;font-size:14px;cursor:pointer">→ رجوع</button>
          <button id="pdfPreviewSend" style="flex:1;background:#1A5276;color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:bold;cursor:pointer">📤 إرسال</button>
        </div>
      </div>`;
    document.body.appendChild(modal);
    function cleanup(){ URL.revokeObjectURL(url); modal.remove(); }
    modal.querySelector('#pdfPreviewBack').onclick=()=>{ cleanup(); resolve(false); };
    modal.querySelector('#pdfPreviewSend').onclick=async ()=>{
      const btn=modal.querySelector('#pdfPreviewSend');
      btn.disabled=true; btn.innerHTML='⏳ جاري الإرسال...';
      try{ await onConfirm(); }
      catch(err){ if(!(err && err.name==='AbortError')) console.error(err); }
      cleanup(); resolve(true);
    };
  });
}

// الدالة الرئيسية: تولّد الـ PDF، تعرض معاينة، ولو المستخدم ضغط إرسال تفتح شاشة المشاركة (واتساب وغيره)، ولو مش مدعوم بترجع لنافذة الطباعة القديمة تلقائيًا
async function sendDocument(title, bodyHtml, filename){
  try{
    const {pdfBlob, jpegBlob}=await generateDocumentPdfBlob(title, bodyHtml);
    await showPdfPreviewModal(jpegBlob, async ()=>{
      const file=new File([pdfBlob], filename, {type:'application/pdf'});
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file], title});
        return;
      }
      const url=URL.createObjectURL(pdfBlob);
      const a=document.createElement('a');
      a.href=url; a.download=filename;
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
      setTimeout(()=>URL.revokeObjectURL(url),5000);
    });
  }catch(err){
    if(err && err.name==='AbortError') return;
    console.error(err);
    printDocument(title, bodyHtml);
  }
}

async function printClientStatement(cid){
  const c=clients.find(c=>c.id===cid);
  if(!c)return;
  const bal=clientBalance(c.id);
  const cInvoices=invoices.filter(i=>i.clientId===cid);
  const cPayments=payments.filter(p=>p.clientId===cid);
  const cReturns=returns.filter(r=>r.clientId===cid);
  const totalInv=cInvoices.reduce((s,i)=>s+i.total,0);
  const totalPaid=cPayments.reduce((s,p)=>s+p.amount,0);
  const totalRet=cReturns.reduce((s,r)=>s+r.total,0);
  const events=[
    ...(c.opening>0?[{date:c.openingDate||c.createdAt?.slice(0,10)||today(),type:'opening',label:'رصيد افتتاحي',amount:c.opening}]:[]),
    ...cInvoices.map(i=>({date:i.date,type:'invoice',label:'فاتورة #'+(i.number||i.id.slice(-4)),amount:i.total,lines:i.lines})),
    ...cPayments.map(p=>({date:p.date,type:'payment',label:'سداد'+(p.note?' — '+p.note:''),amount:p.amount})),
    ...cReturns.map(r=>({date:r.date,type:'return',label:'مرتجع #'+(r.number||r.id.slice(-4)),amount:r.total,lines:r.lines}))
  ].sort((a,b)=>a.date.localeCompare(b.date));
  let running=0;
  const rows=events.map(ev=>{
    const debit=(ev.type==='invoice'||ev.type==='opening')?ev.amount:0;
    const credit=(ev.type==='payment'||ev.type==='return')?ev.amount:0;
    running += debit - credit;
    const detail=(ev.type==='invoice'||ev.type==='return')?linesDetailHtml(ev.lines):'';
    return `<tr>
      <td>${ev.date}</td><td>${ev.label}${detail}</td>
      <td>${debit?fmt(debit):'—'}</td>
      <td>${credit?fmt(credit):'—'}</td>
      <td>${fmt(running)}</td>
    </tr>`;
  }).join('');
  const balLbl=bal>0?'مستحق عليه':bal<0?'له رصيد':'الحساب صافي';
  const body=`
    <div class="doc-info">
      <div><strong>العميل:</strong> ${c.name}</div>
      ${c.phone?`<div><strong>الهاتف:</strong> ${c.phone}</div>`:''}
      <div><strong>تاريخ الكشف:</strong> ${today()}</div>
    </div>
    <div class="doc-summary">
      <div class="doc-sum-box"><div class="n">${fmt(totalInv)}</div><div class="l">إجمالي الفواتير</div></div>
      <div class="doc-sum-box"><div class="n">${fmt(totalPaid)}</div><div class="l">إجمالي المدفوع</div></div>
      ${totalRet>0?`<div class="doc-sum-box"><div class="n">${fmt(totalRet)}</div><div class="l">إجمالي المرتجع</div></div>`:''}
      <div class="doc-sum-box"><div class="n">${fmt(Math.abs(bal))}</div><div class="l">${balLbl}</div></div>
    </div>
    ${events.length===0?'<div style="text-align:center;color:#717D7E;padding:20px 0">لا توجد حركات</div>':`<table><thead><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead><tbody>${rows}</tbody></table>`}
    <div class="doc-total">${balLbl}: ${fmt(Math.abs(bal))} جنيه</div>`;
  await sendDocument(`كشف حساب: ${c.name}`, body, `كشف-حساب-${c.name}.pdf`);
}

function addLine(){invLines.push({id:uid(),productId:'',productName:'',qty:'',price:'',discount:'',bonus:'',expiry:''});renderInvoices();}
function removeLine(id){invLines=invLines.filter(l=>l.id!==id);renderInvoices();}
function updateLine(id,field,value){
  invLines=invLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||'',expiry:'',price:p?.price?Number(p.price):l.price};}
    return {...l,[field]:['qty','price','discount','bonus'].includes(field)?Number(value):value};
  });
  // نحفظ اختيار العميل والتاريخ قبل الرندر
  const savedClient=document.getElementById('inv_client')?.value;
  const savedClientText=document.getElementById('inv_client_search')?.value;
  const savedDate=document.getElementById('inv_date')?.value;
  renderInvoices();
  setTimeout(()=>{
    if(savedClient){const el=document.getElementById('inv_client');if(el)el.value=savedClient;const st=document.getElementById('inv_client_search');if(st)st.value=savedClientText||'';}
    if(savedDate){const el=document.getElementById('inv_date');if(el)el.value=savedDate;}
  },0);
}

function saveInvoice(){
  const clientId=document.getElementById('inv_client')?.value;
  const date=document.getElementById('inv_date')?.value||today();
  if(!clientId){alert('اختر عميل');return;}
  if(invLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}

  // لو بنعدّل فاتورة موجودة: نرجع تأثيرها القديم على المخزن مؤقتًا قبل الفحص
  let removedInv=null, removedMovements=[];
  if(editInvoiceId){
    removedInv = invoices.find(i=>i.id===editInvoiceId) || null;
    removedMovements = movements.filter(m=>m.invoiceId===editInvoiceId);
    invoices = invoices.filter(i=>i.id!==editInvoiceId);
    movements = movements.filter(m=>m.invoiceId!==editInvoiceId);
  }
  function rollbackEdit(){
    if(removedInv){
      invoices.push(removedInv);
      movements = movements.concat(removedMovements);
    }
  }

  // التحقق من الكمية المتراكمة لكل صنف+تاريخ في الفاتورة
  const needed={};
  for(const l of invLines){
    if(!l.productId) continue;
    const key=l.productId+'|'+(l.expiry||'__any__');
    if(!needed[key]) needed[key]={productId:l.productId,expiry:l.expiry||'',total:0};
    needed[key].total+=Number(l.qty)+(Number(l.bonus)||0);
  }
  for(const key of Object.keys(needed)){
    const {productId,expiry,total}=needed[key];
    const p=stock.find(p=>p.id===productId);
    if(expiry){
      const batches=stockBatches(productId);
      const batch=batches.find(([exp])=>exp===expiry);
      const available=batch?batch[1]:0;
      if(total>available){
        rollbackEdit();
        alert(`❌ الكمية المتاحة من "${p?.name||'المنتج'}" بتاريخ ${expiry} هي ${available} فقط\nإجمالي المطلوب في الفاتورة: ${total}`);
        return;
      }
    } else {
      const available=stockQty(productId);
      if(total>available){
        rollbackEdit();
        alert(`❌ الكمية المتاحة من "${p?.name||'المنتج'}" هي ${available} فقط\nإجمالي المطلوب في الفاتورة: ${total}`);
        return;
      }
    }
  }
  const total=invLines.reduce((s,l)=>{
    const afterDiscount=Number(l.price)*(1-(Number(l.discount)||0)/100);
    return s+(Number(l.qty)*afterDiscount);
  },0);
  const invId = editInvoiceId || uid();
  const invNumber = removedInv ? removedInv.number : (invoices.length>0?Math.max(...invoices.map(i=>i.number||0)):0)+1;
  const createdAt = removedInv ? removedInv.createdAt : new Date().toISOString();
  const inv={id:invId,number:invNumber,clientId,date,lines:invLines.map(l=>({...l,qty:Number(l.qty),price:Number(l.price),discount:Number(l.discount||0),bonus:Number(l.bonus||0)})),total,createdAt};
  invoices.push(inv);
  // خصم الكمية الفعلية + البونص من المخزن
  invLines.forEach(l=>{
    if(l.productId){
      const totalQty=Number(l.qty)+(Number(l.bonus)||0);
      movements.push({id:uid(),productId:l.productId,type:'out',qty:totalQty,date,note:'ف.مبيعات #'+inv.number+(l.bonus>0?` (${l.qty} مبيعات + ${l.bonus} بونص)`:``),invoiceId:inv.id,expiry:l.expiry||''});
    }
  });
  save();showInvForm=false;editInvoiceId=null;invLines=[{id:uid(),productId:'',productName:'',qty:'',price:'',discount:'',bonus:'',expiry:''}];renderInvoices();
}

function addRetLine(){retLines.push({id:uid(),productId:'',productName:'',qty:'',price:'',expiry:''});renderReturns();}
function removeRetLine(id){retLines=retLines.filter(l=>l.id!==id);renderReturns();}
function updateRetLine(id,field,value){
  retLines=retLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||''};}
    return {...l,[field]:['qty','price'].includes(field)?Number(value):value};
  });
  const savedClient=document.getElementById('ret_client')?.value;
  const savedClientText=document.getElementById('ret_client_search')?.value;
  const savedDate=document.getElementById('ret_date')?.value;
  renderReturns();
  if(savedClient){document.getElementById('ret_client').value=savedClient;const st=document.getElementById('ret_client_search');if(st)st.value=savedClientText||'';}
  if(savedDate) document.getElementById('ret_date').value=savedDate;
}

function saveReturn(){
  const clientId=document.getElementById('ret_client')?.value;
  const date=document.getElementById('ret_date')?.value||today();
  if(!clientId){alert('اختر عميل');return;}
  if(retLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}

  // التحقق إن الكمية المرتجعة منطقية (مش أكبر من اللي اتباع فعلاً)
  for(const l of retLines){
    if(!l.productId) continue;
    const qty=Number(l.qty);
    if(!qty||qty<=0){alert('أدخل كمية صحيحة لكل صنف');return;}
  }
  const total=retLines.reduce((s,l)=>s+(Number(l.qty)*Number(l.price)),0);
  const ret={id:uid(),number:returns.length+1,clientId,date,lines:retLines.map(l=>({...l,qty:Number(l.qty),price:Number(l.price)})),total,createdAt:new Date().toISOString()};
  returns.push(ret);
  // المرتجع بيرجع للمخزن (وارد)
  retLines.forEach(l=>{
    if(l.productId) movements.push({id:uid(),productId:l.productId,type:'in',qty:Number(l.qty),date,note:'مردود مبيعات #'+ret.number,returnId:ret.id,expiry:l.expiry||''});
  });
  save();
  showRetForm=false;
  retLines=[{id:uid(),productId:'',productName:'',qty:'',price:'',expiry:''}];

async function printStockSummaryPdf(){
  const rows=stock.map(p=>{
    const qty=stockQty(p.id);
    const batches=stockBatches(p.id);
    const batchTxt=batches.length>0?batches.map(([exp,q])=>`${exp}: ${q}`).join(' | '):'—';
    return `<tr>
      <td>${p.name}</td>
      <td>${p.unit}</td>
      <td style="font-weight:bold;color:${qty<10?'#C0392B':'#1E8449'}">${qty}</td>
      <td>${p.price?fmt(p.price):'—'}</td>
      <td style="font-size:11px">${batchTxt}</td>
    </tr>`;
  }).join('');
  const totalItems=stock.length;
  const lowCount=stock.filter(p=>stockQty(p.id)<10).length;
  const body=`
    <div class="doc-info">
      <div><strong>تاريخ الجرد:</strong> ${today()}</div>
      <div><strong>عدد الأصناف:</strong> ${totalItems}</div>
    </div>
    <div class="doc-summary">
      <div class="doc-sum-box"><div class="n">${totalItems}</div><div class="l">إجمالي الأصناف</div></div>
      <div class="doc-sum-box"><div class="n">${lowCount}</div><div class="l">أصناف قاربت على النفاد</div></div>
    </div>
    ${stock.length===0?'<div style="text-align:center;color:#717D7E;padding:20px 0">لا توجد أصناف</div>':`<table><thead><tr><th>الصنف</th><th>الوحدة</th><th>الرصيد الحالي</th><th>السعر</th><th>الدفعات (الصلاحية: الكمية)</th></tr></thead><tbody>${rows}</tbody></table>`}`;
  await sendDocument('جرد المخزن', body, `جرد-المخزن-${today()}.pdf`);
}

function addProduct(){
  const name=document.getElementById('p_name')?.value.trim();
  const unit=document.getElementById('p_unit')?.value||'وحدة';
  const manufacturer=document.getElementById('p_manufacturer')?.value.trim()||'';
  const activeIngredient=document.getElementById('p_active')?.value.trim()||'';
  const openingQty=Number(document.getElementById('p_opening_qty')?.value||0);
  const openingDate=document.getElementById('p_opening_date')?.value||today();
  const openingExpiry=document.getElementById('p_opening_expiry')?.value||'';
  const price=Number(document.getElementById('p_price')?.value||0);
  if(!name){alert('أدخل اسم المنتج');return;}
  const newProduct={id:uid(),name,unit};
  if(manufacturer)newProduct.manufacturer=manufacturer;
  if(activeIngredient)newProduct.activeIngredient=activeIngredient;
  if(price>0)newProduct.price=price;
  stock.push(newProduct);
  if(openingQty>0){
    movements.push({id:uid(),productId:newProduct.id,type:'in',qty:openingQty,date:openingDate,note:'رصيد افتتاحي',expiry:openingExpiry});
  }
  save();showProductForm=false;renderStock();
}
function deleteProduct(id){
  if(!confirm('هتحذف المنتج ده؟'))return;
  stock=stock.filter(p=>p.id!==id);
  movements=movements.filter(m=>m.productId!==id);
  save();renderStock();
}
function saveMovement(){
  const productId=document.getElementById('mov_product')?.value;
  const qty=Number(document.getElementById('mov_qty')?.value||0);
  const date=document.getElementById('mov_date')?.value||today();
  const note=document.getElementById('mov_note')?.value||'';
  const expiry=currentMovType==='in'?(document.getElementById('mov_expiry')?.value||''):'';
  if(!productId||!qty){alert('اختر منتج وأدخل الكمية');return;}
  if(currentMovType==='out'&&stockQty(productId)<qty){alert('الكمية المتاحة '+stockQty(productId)+' فقط');return;}
  movements.push({id:uid(),productId,type:currentMovType,qty,date,note,expiry});
  save();showMovForm=false;renderStock();
}

  const sorted=[...movements].sort((a,b)=>b.date.localeCompare(a.date));

function exportData(){

function buildExportBlob(){
  const data={clients,invoices,payments,stock,movements,returns,suppliers,purchases,supplierPayments,purchaseReturns,expenses,exportDate:new Date().toISOString()};
  return new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
}
function markExported(){
  DB.set('_lastExport', new Date().toISOString());
  hideExportReminder();
}
function doExportDevice(){
  const blob=buildExportBlob();
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download='نسخة_احتياطية'+backupFileLabel()+'_'+today()+'.json';a.click();
  URL.revokeObjectURL(url);
  markExported();
  document.getElementById('exportModal').style.display='none';
}
async function doExportShare(){
  const blob=buildExportBlob();
  const fileName='نسخة_احتياطية'+backupFileLabel()+'_'+today()+'.json';
  // أول حاجة: حفظ الملف على الجهاز
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url;a.download=fileName;a.click();
  URL.revokeObjectURL(url);
  markExported();
  document.getElementById('exportModal').style.display='none';
  // تاني حاجة: لو المتصفح يدعم Web Share API نجرب نشاركه
  await new Promise(r=>setTimeout(r,800));
  const file=new File([blob],fileName,{type:'application/json'});
  if(navigator.share){
    try{
      if(navigator.canShare && navigator.canShare({files:[file]})){
        await navigator.share({files:[file],title:'نسخة احتياطية',text:'نسخة احتياطية من مدير البيطري المتكامل'});
      }else{
        await navigator.share({title:'نسخة احتياطية - '+fileName,text:'تم حفظ الملف على جهازك، ارفعه على جوجل درايف أو جيميل من مدير الملفات.'});
      }
    }catch(e){}
  }else{
    // للمتصفحات اللي مش بتدعم Share API
    setTimeout(()=>alert('✅ تم حفظ الملف على جهازك.\nافتح تطبيق جوجل درايف أو جيميل وارفع الملف من مجلد التنزيلات (Downloads).'),300);
  }
}
function hideExportReminder(){
  const el=document.getElementById('exportReminder');
  if(el) el.style.display='none';
}
// نسخة احتياطية تلقائية فعلية: بتنزل ملف الباك أب لوحدها في مجلد التنزيلات
// من غير ما ينتظر المستخدم يدوس على أي زرار — بتحمي البيانات حتى لو حد مسح بيانات كروم بعد كده
function checkAutoBackup(){
  const hasData = clients.length>0 || invoices.length>0 || purchases.length>0 || suppliers.length>0 || stock.length>0;
  if(!hasData) return; // مفيش داعي لباك أب فاضي على جهاز جديد لسه ملوش بيانات
  const last = DB.get('_lastAutoExport');
  const daysSince = last ? (Date.now()-new Date(last).getTime())/(1000*60*60*24) : Infinity;
  if(daysSince < 3) return; // باك أب تلقائي كل 3 أيام بحد أقصى
  try{
    const blob = buildExportBlob();
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = 'نسخة_احتياطية_تلقائية'+backupFileLabel()+'_'+today()+'.json';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(()=>URL.revokeObjectURL(url), 3000);
    const now = new Date().toISOString();
    DB.set('_lastAutoExport', now);
    DB.set('_lastExport', now); // يحدّث نفس مؤشر آخر تصدير عشان البانر ميزعجش المستخدم كمان
    hideExportReminder();
  }catch(e){
    console.error('فشل الباك أب التلقائي', e);
  }
}

function checkExportReminder(){
  const last=DB.get('_lastExport');
  const banner=document.getElementById('exportReminder');
  if(!banner)return;
  if(!last){
    banner.style.display='flex';
    banner.querySelector('.reminder-text').textContent='⚠️ متعملتش نسخة احتياطية لسه — يفضل تصدّر بياناتك بانتظام.';
    return;
  }
  const daysSince=(Date.now()-new Date(last).getTime())/(1000*60*60*24);
  if(daysSince>=7){
    banner.style.display='flex';
    banner.querySelector('.reminder-text').textContent=`⚠️ آخر تصدير كان من ${Math.floor(daysSince)} يوم — يفضل تعمل نسخة احتياطية جديدة.`;
  }else{
    banner.style.display='none';
  }
}
function importData(){
  const input=document.createElement('input');
  input.type='file';input.accept='.json';
  input.onchange=(e)=>{
    const file=e.target.files[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=(ev)=>{
      try{
        const data=JSON.parse(ev.target.result);
        if(!data.clients||!data.invoices){alert('الملف مش صح!');return;}
        if(!confirm('هيتم استبدال كل البيانات الحالية بالنسخة دي. متأكد؟'))return;
        clients=data.clients||[];invoices=data.invoices||[];payments=data.payments||[];stock=data.stock||[];movements=data.movements||[];
        let oldFileWarning=false;
        if(Array.isArray(data.returns)){returns=data.returns;}else{oldFileWarning=true;}
        if(Array.isArray(data.suppliers)){suppliers=data.suppliers;}else{oldFileWarning=true;}
        if(Array.isArray(data.purchases)){purchases=data.purchases;}else{oldFileWarning=true;}
        if(Array.isArray(data.supplierPayments)){supplierPayments=data.supplierPayments;}else{oldFileWarning=true;}
        if(Array.isArray(data.purchaseReturns)){purchaseReturns=data.purchaseReturns;}else{oldFileWarning=true;}
        if(Array.isArray(data.expenses)){expenses=data.expenses;}
        if(oldFileWarning) alert('⚠️ ملاحظة: الملف ده نسخة قديمة ومش فيه كل البيانات (زي المرتجع أو الموردين) — البيانات الناقصة الموجودة على الجهاز هتفضل زي ما هي.');
        save();alert('✅ تم استيراد البيانات بنجاح!');render();
      }catch(err){alert('حصل خطأ في قراءة الملف!');}
    };
    reader.readAsText(file);
  };
  input.click();
}

let expenseQuickFilter='month';

let showNoteForm=false;
function renderExpenses(){
  const now=new Date();
  const defFrom=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0')+'-01';
  const defTo=today();

  let fromVal, toVal;
  if(expenseQuickFilter==='today'){ fromVal=today(); toVal=today(); }
  else if(expenseQuickFilter==='week'){
    const d=new Date(); d.setDate(d.getDate()-6);
    fromVal=d.toISOString().slice(0,10); toVal=today();
  }
  else if(expenseQuickFilter==='month'){ fromVal=defFrom; toVal=defTo; }
  else if(expenseQuickFilter==='all'){ fromVal='0000-01-01'; toVal='9999-12-31'; }
  else{
    fromVal=document.getElementById('exp_from')?.value||defFrom;
    toVal=document.getElementById('exp_to')?.value||defTo;
  }

  const filtered=[...expenses].filter(e=>e.date>=fromVal&&e.date<=toVal).sort((a,b)=>b.date.localeCompare(a.date));
  const total=filtered.reduce((s,e)=>s+Number(e.amount),0);

  const filterBtn=(key,label)=>`<button class="btn-sm" style="background:${expenseQuickFilter===key?'#1A5276':'#D5D8DC'};color:${expenseQuickFilter===key?'#fff':'#333'}" onclick="expenseQuickFilter='${key}';renderExpenses()">${label}</button>`;

  const rows=filtered.map(e=>`
    <div class="list-item">
      <div class="list-item-head">
        <div><div class="list-item-name">${e.label}</div><div class="list-item-sub">📅 ${e.date}</div></div>
        <div class="list-item-bal"><div class="list-item-bal-num" style="color:#C0392B">${fmt(e.amount)} ج</div></div>
      </div>
      <div class="list-item-actions">
        <button class="btn-sm red" onclick="deleteExpense('${e.id}')">🗑 حذف</button>

function addExpense(){

let treasuryDate='';
// بتجمع "وارد" و"صادر" ليوم معين بس (افتراضيًا النهاردة) — ورصيد أول اليوم ده بيتحسب تلقائي = رصيد أول الخزنة + كل حركات الأيام اللي فاتت
function treasuryData(day){
  day=day||today();
  const incoming=payments.filter(p=>p.date===day).map(p=>{
    const c=clients.find(c=>c.id===p.clientId);
    return {date:p.date,label:c?.name||'عميل',note:p.note||'',amount:p.amount};
  }).sort((a,b)=>a.date.localeCompare(b.date));
  const outSup=supplierPayments.filter(p=>p.date===day).map(p=>{
    const s=suppliers.find(s=>s.id===p.supplierId);
    return {date:p.date,label:s?.name||'مورد',note:p.note||'سداد مورد',amount:p.amount};
  });
  const outExp=expenses.filter(e=>e.date===day).map(e=>({date:e.date,label:e.label,note:'مصروف',amount:e.amount}));
  const outgoing=[...outSup,...outExp].sort((a,b)=>a.date.localeCompare(b.date));

  // رصيد أول اليوم ده = رصيد أول الخزنة الأساسي + كل ما قبل هذا اليوم من وارد وصادر
  const priorIn=payments.filter(p=>p.date<day).reduce((s,p)=>s+p.amount,0);
  const priorOutSup=supplierPayments.filter(p=>p.date<day).reduce((s,p)=>s+p.amount,0);
  const priorOutExp=expenses.filter(e=>e.date<day).reduce((s,e)=>s+e.amount,0);
  const dayOpening=treasuryOpening+priorIn-priorOutSup-priorOutExp;

  const totalIn=incoming.reduce((s,x)=>s+x.amount,0);
  const totalOut=outgoing.reduce((s,x)=>s+x.amount,0);
  const closing=dayOpening+totalIn-totalOut;
  return {incoming,outgoing,totalIn,totalOut,closing,dayOpening,day};
}

  document.getElementById('tab-treasury').innerHTML=`

let pricelistSearch='';
function updateProductPrice(pid, val){
  const p=stock.find(p=>p.id===pid);
  if(!p)return;
  const price=Number(val||0);
  if(price>0) p.price=price; else delete p.price;
  save();
}
function updateProductField(pid, field, val){
  const p=stock.find(p=>p.id===pid);
  if(!p)return;
  const v=(val||'').trim();
  if(v) p[field]=v; else delete p[field];
  save();
}

      <input type="text" class="pl-active" value="${p.activeIngredient||''}" placeholder="—" onchange="updateProductField('${p.id}','activeIngredient',this.value)">
      <div class="pl-unit">${p.unit}</div>

function addSupplier(){
  const name=document.getElementById('sup_name')?.value?.trim();
  if(!name){alert('أدخل اسم المورد');return;}
  suppliers.push({id:uid(),name,phone:document.getElementById('sup_phone')?.value||'',area:'',opening:Number(document.getElementById('sup_opening')?.value||0),openingDate:document.getElementById('sup_opening_date')?.value||today(),createdAt:today()});
  save();renderSuppliers();
}

function deleteSupplier(id){
  if(!confirm('هتحذف المورد ده وكل المشتريات والمدفوعات والمردودات المرتبطة بيه؟'))return;
  const purIds=purchases.filter(p=>p.supplierId===id).map(p=>p.id);
  const purRetIds=purchaseReturns.filter(r=>r.supplierId===id).map(r=>r.id);
  movements=movements.filter(m=>!purIds.includes(m.purchaseId)&&!purRetIds.includes(m.purchaseReturnId));
  purchases=purchases.filter(p=>p.supplierId!==id);
  supplierPayments=supplierPayments.filter(p=>p.supplierId!==id);
  purchaseReturns=purchaseReturns.filter(r=>r.supplierId!==id);
  suppliers=suppliers.filter(s=>s.id!==id);
  save();renderSuppliers();
}

function renderSupplierDetail(){
  const s=suppliers.find(s=>s.id===supplierDetailId);
  if(!s){supplierDetailId=null;renderSuppliers();return;}
  const bal=supplierBalance(s.id);
  const supPurchases=purchases.filter(p=>p.supplierId===s.id).sort((a,b)=>b.date.localeCompare(a.date));
  const supPayments=supplierPayments.filter(p=>p.supplierId===s.id).sort((a,b)=>b.date.localeCompare(a.date));
  const supPurRet=purchaseReturns.filter(r=>r.supplierId===s.id).sort((a,b)=>b.date.localeCompare(a.date));
  const opening=Number(s.opening||0);
  const totalPurchased=supPurchases.reduce((acc,p)=>acc+p.total,0);
  const totalPaid=supPayments.reduce((acc,p)=>acc+p.amount,0);
  const totalRet=supPurRet.reduce((acc,r)=>acc+r.total,0);

  // سجل الحركات مدمج: مشتريات + سداد + مردود مشتريات
  let allMoves=[
    ...supPurchases.map(p=>({date:p.date,type:'purchase',desc:`فاتورة مشتريات #${p.number}`,amount:p.total,id:p.id})),
    ...supPayments.map(p=>({date:p.date,type:'payment',desc:`سداد${p.note?' — '+p.note:''}`,amount:p.amount,id:null})),
    ...supPurRet.map(r=>({date:r.date,type:'return',desc:`مردود مشتريات #${r.number}`,amount:r.total,id:r.id})),
  ].sort((a,b)=>a.date.localeCompare(b.date));

  let runBal=opening;
  const movRows=allMoves.map(m=>{
    if(m.type==='purchase') runBal+=m.amount;
    else runBal-=m.amount;
    const clickAttr=m.type==='purchase'?`onclick="openPurchaseFromSupplier('${m.id}','${s.id}')" style="cursor:pointer"`
      :m.type==='return'?`onclick="openPurRetFromSupplier('${m.id}','${s.id}')" style="cursor:pointer"`:'';
    return `<tr ${clickAttr}>
      <td>${m.date}${m.type==='purchase'||m.type==='return'?' 👁':''}</td>
      <td>${m.desc}</td>
      <td style="color:#C0392B">${m.type==='purchase'?fmt(m.amount):'—'}</td>
      <td style="color:#D68910">${m.type==='return'?fmt(m.amount):'—'}</td>
      <td style="color:#1E8449">${m.type==='payment'?fmt(m.amount):'—'}</td>
      <td style="font-weight:bold;color:${runBal>0?'#C0392B':'#1E8449'}">${fmt(Math.abs(runBal))}</td>
    </tr>`;
  }).join('');

  document.getElementById('tab-suppliers').innerHTML=`
    <div class="back-row">
      <button class="btn gray" onclick="supplierDetailId=null;renderSuppliers()">← رجوع</button>
      <div class="page-title">كشف حساب: ${s.name}</div>
    </div>
    ${s.phone?`<div style="font-size:12px;color:#717D7E;margin-bottom:8px">📞 ${s.phone}</div>`:''}
    <div class="summary">
      <div class="sum-card blue"><div class="sum-num">${fmt(totalPurchased)}</div><div class="sum-lbl">إجمالي المشتريات</div></div>
      <div class="sum-card green"><div class="sum-num">${fmt(totalPaid)}</div><div class="sum-lbl">إجمالي المدفوع</div></div>
      ${totalRet>0?`<div class="sum-card orange"><div class="sum-num">${fmt(totalRet)}</div><div class="sum-lbl">إجمالي مردود المشتريات</div></div>`:''}
      <div class="sum-card ${bal>0?'red':'green'}"><div class="sum-num">${fmt(Math.abs(bal))}</div><div class="sum-lbl">${bal>0?'مستحق للمورد':bal<0?'له رصيد':'الحساب صافي'}</div></div>
    </div>
    <div class="btn-row" style="margin-bottom:10px">
      <button class="btn green" onclick="switchTab('suppay')">💵 تسجيل سداد للمورد</button>
      <button class="btn orange" onclick="switchTab('purreturns')">↪️ تسجيل مردود مشتريات</button>
      <button class="btn blue" onclick="this.disabled=true;const t=this.innerHTML;this.innerHTML='⏳ جاري التجهيز...';printSupplierStatement('${s.id}').finally(()=>{this.disabled=false;this.innerHTML=t;})">📤 إرسال PDF</button>
    </div>
    <div class="card">
      <div class="card-head">📋 حركات الحساب</div>
      ${allMoves.length>0||opening>0?`<div class="tbl-wrap"><table>
        <thead><tr><th>التاريخ</th><th>البيان</th><th>مشتريات</th><th>مردود</th><th>مدفوع</th><th>الرصيد</th></tr></thead>
        <tbody>
          ${opening>0?`<tr><td>—</td><td><span class="badge orange">رصيد افتتاحي</span></td><td style="color:#C0392B">${fmt(opening)}</td><td>—</td><td>—</td><td style="font-weight:bold">${fmt(opening)}</td></tr>`:''}
          ${movRows}
        </tbody>
      </table></div>`:'<div class="empty">لا توجد حركات</div>'}
    </div>`;
}

async function printSupplierStatement(sid){
  const s=suppliers.find(s=>s.id===sid);
  if(!s)return;
  const bal=supplierBalance(s.id);
  const sPurchases=purchases.filter(p=>p.supplierId===sid);
  const sPayments=supplierPayments.filter(p=>p.supplierId===sid);
  const sReturns=purchaseReturns.filter(r=>r.supplierId===sid);
  const totalPur=sPurchases.reduce((s,p)=>s+p.total,0);
  const totalPaid=sPayments.reduce((s,p)=>s+p.amount,0);
  const totalRet=sReturns.reduce((s,r)=>s+r.total,0);
  const opening=Number(s.opening||0);
  const events=[
    ...(opening>0?[{date:s.openingDate||s.createdAt?.slice(0,10)||today(),type:'opening',label:'رصيد افتتاحي',amount:opening}]:[]),
    ...sPurchases.map(p=>({date:p.date,type:'purchase',label:'فاتورة مشتريات #'+(p.number||p.id.slice(-4)),amount:p.total,lines:p.lines})),
    ...sPayments.map(p=>({date:p.date,type:'payment',label:'سداد'+(p.note?' — '+p.note:''),amount:p.amount})),
    ...sReturns.map(r=>({date:r.date,type:'return',label:'مردود مشتريات #'+(r.number||r.id.slice(-4)),amount:r.total,lines:r.lines}))
  ].sort((a,b)=>a.date.localeCompare(b.date));
  let running=0;
  const rows=events.map(ev=>{
    const debit=(ev.type==='purchase'||ev.type==='opening')?ev.amount:0;
    const credit=(ev.type==='payment'||ev.type==='return')?ev.amount:0;
    running += debit - credit;
    const detail=(ev.type==='purchase'||ev.type==='return')?linesDetailHtml(ev.lines):'';
    return `<tr>
      <td>${ev.date}</td><td>${ev.label}${detail}</td>
      <td>${debit?fmt(debit):'—'}</td>
      <td>${credit?fmt(credit):'—'}</td>
      <td>${fmt(running)}</td>
    </tr>`;
  }).join('');
  const balLbl=bal>0?'مستحق للمورد':bal<0?'له رصيد':'الحساب صافي';
  const body=`
    <div class="doc-info">
      <div><strong>المورد:</strong> ${s.name}</div>
      ${s.phone?`<div><strong>الهاتف:</strong> ${s.phone}</div>`:''}
      <div><strong>تاريخ الكشف:</strong> ${today()}</div>
    </div>
    <div class="doc-summary">
      <div class="doc-sum-box"><div class="n">${fmt(totalPur)}</div><div class="l">إجمالي المشتريات</div></div>
      <div class="doc-sum-box"><div class="n">${fmt(totalPaid)}</div><div class="l">إجمالي المدفوع</div></div>
      ${totalRet>0?`<div class="doc-sum-box"><div class="n">${fmt(totalRet)}</div><div class="l">إجمالي مردود المشتريات</div></div>`:''}
      <div class="doc-sum-box"><div class="n">${fmt(Math.abs(bal))}</div><div class="l">${balLbl}</div></div>
    </div>
    ${events.length===0?'<div style="text-align:center;color:#717D7E;padding:20px 0">لا توجد حركات</div>':`<table><thead><tr><th>التاريخ</th><th>البيان</th><th>مدين</th><th>دائن</th><th>الرصيد</th></tr></thead><tbody>${rows}</tbody></table>`}
    <div class="doc-total">${balLbl}: ${fmt(Math.abs(bal))} جنيه</div>`;
  await sendDocument(`كشف حساب مورد: ${s.name}`, body, `كشف-حساب-مورد-${s.name}.pdf`);
}

let showPurForm=false;
let purDetailId=null;
let editPurchaseId=null;
let purDetailFromSupplier=null;

function openPurchaseFromSupplier(purId,supplierId){

}
function goBackFromPurDetail(){

  let formHtml='';

    let linesHtml=purchaseLines.map(l=>{
      const stockOptsArr=stock.map(p=>({id:p.id,label:p.name}));
      return `<div class="line-box">
        <div class="form-row">

            ${stock.length>0?searchableSelectHtml(`purline_${l.id}`, stockOptsArr, '🔍 دور على الصنف...', l.productId, `updatePurLine('${l.id}','productId',document.getElementById('purline_${l.id}').value)`):`<input type="text" value="${l.productName}" placeholder="اسم المنتج" onchange="updatePurLine('${l.id}','productName',this.value)">`}
          </div>
          <div class="form-group"><div class="lbl">📅 الصلاحية</div><input type="month" value="${l.expiry}" onchange="updatePurLine('${l.id}','expiry',this.value)"></div>
        </div>
        <div class="form-row">
          <div class="form-group"><div class="lbl">الكمية *</div><input type="number" min="1" value="${l.qty}" onchange="updatePurLine('${l.id}','qty',this.value)"></div>
          <div class="form-group"><div class="lbl">سعر الشراء *</div><input type="number" min="0" value="${l.price}" onchange="updatePurLine('${l.id}','price',this.value)"></div>
        </div>
        <button class="btn-sm red" onclick="removePurLine('${l.id}')">🗑 حذف السطر</button>
      </div>`;
    }).join('');

    const purTotal=purchaseLines.reduce((s,l)=>s+Number(l.qty)*Number(l.price),0);
    formHtml=`<div class="card">
      <div class="card-head ${editingPur?'orange':'green'}">${editingPur?'✏️ تعديل فاتورة مشتريات #'+editingPur.number:'إنشاء فاتورة مشتريات جديدة'}</div>
      <div class="form-row" style="padding:12px 12px 0">
        <div class="form-group"><div class="lbl">المورد *</div>${searchableSelectHtml('pur_supplier', supOptsArr, '🔍 دور على المورد...', editingPur?.supplierId||'')}</div>
        <div class="form-group"><div class="lbl">التاريخ</div><input type="date" id="pur_date" value="${editingPur?.date||today()}"></div>
      </div>
      <div style="padding:0 12px">
      ${linesHtml}
      <button class="btn-outline" style="margin-top:8px" onclick="addPurLine()">+ إضافة صنف</button>

      <div style="display:flex;gap:8px;margin-top:10px;padding-bottom:12px">
        <button class="btn ${editingPur?'orange':'green'}" onclick="savePurchase()">${editingPur?'✓ حفظ التعديل':'✓ حفظ الفاتورة'}</button>

    ${sorted.length===0?'<div class="empty">لا توجد فواتير مشتريات</div>':`<div class="card tbl-wrap"><table><thead><tr><th>#</th><th>المورد</th><th>التاريخ</th><th>الإجمالي</th><th></th></tr></thead><tbody>${rows}</tbody></table></div>`}`;

function editPurchase(id){
  const pur=purchases.find(p=>p.id===id);
  if(!pur)return;
  editPurchaseId=id;
  purchaseLines=(pur.lines||[]).map(l=>({...l}));
  showPurForm=true;
  purDetailId=null;

function removePurLine(id){purchaseLines=purchaseLines.filter(l=>l.id!==id);renderPurchases();}
function updatePurLine(id,field,value){
  purchaseLines=purchaseLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||''};}
    return {...l,[field]:['qty','price'].includes(field)?Number(value):value};

  const savedSup=document.getElementById('pur_supplier')?.value;
  const savedSupText=document.getElementById('pur_supplier_search')?.value;

function savePurchase(){
  const supplierId=document.getElementById('pur_supplier')?.value;
  const date=document.getElementById('pur_date')?.value||today();
  if(!supplierId){alert('اختر مورد');return;}
  if(purchaseLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}
  const total=purchaseLines.reduce((s,l)=>s+Number(l.qty)*Number(l.price),0);

  let removedPur=null;
  if(editPurchaseId){
    removedPur = purchases.find(p=>p.id===editPurchaseId) || null;
    movements = movements.filter(m=>m.purchaseId!==editPurchaseId);
    purchases = purchases.filter(p=>p.id!==editPurchaseId);
  }

  const purId = editPurchaseId || uid();
  const purNum = removedPur ? removedPur.number : (purchases.length>0?Math.max(...purchases.map(p=>p.number||0)):0)+1;
  const pur={id:purId,number:purNum,supplierId,date,total,lines:purchaseLines.map(l=>({...l}))};
  purchases.push(pur);
  // تحديث المخزن
  purchaseLines.forEach(l=>{
    if(l.productId) movements.push({id:uid(),productId:l.productId,type:'in',qty:Number(l.qty),date,note:'ف.مشتريات #'+purNum,purchaseId:pur.id,expiry:l.expiry||''});
  });
  save();showPurForm=false;editPurchaseId=null;purchaseLines=[{id:uid(),productId:'',productName:'',qty:'',price:'',expiry:''}];renderPurchases();
}

function deletePurchase(id){
  if(!confirm('هتحذف فاتورة المشتريات دي؟ الكميات هترجع للمخزن.'))return;
  movements=movements.filter(m=>m.purchaseId!==id);
  purchases=purchases.filter(p=>p.id!==id);
  save();renderPurchases();
}

function removePurRetLine(id){purRetLines=purRetLines.filter(l=>l.id!==id);renderPurReturns();}
function updatePurRetLine(id,field,value){
  purRetLines=purRetLines.map(l=>{
    if(l.id!==id)return l;
    if(field==='productId'){const p=stock.find(s=>s.id===value);return {...l,productId:value,productName:p?.name||'',expiry:''};}
    return {...l,[field]:['qty','price'].includes(field)?Number(value):value};
  });
  const savedSup=document.getElementById('pret_supplier')?.value;
  const savedSupText=document.getElementById('pret_supplier_search')?.value;
  const savedDate=document.getElementById('pret_date')?.value;
  renderPurReturns();
  setTimeout(()=>{
    if(savedSup){const el=document.getElementById('pret_supplier');if(el)el.value=savedSup;const st=document.getElementById('pret_supplier_search');if(st)st.value=savedSupText||'';}
    if(savedDate){const el=document.getElementById('pret_date');if(el)el.value=savedDate;}
  },0);
}

function savePurRet(){
  const supplierId=document.getElementById('pret_supplier')?.value;
  const date=document.getElementById('pret_date')?.value||today();
  if(!supplierId){alert('اختر مورد');return;}
  if(purRetLines.some(l=>!l.productId&&!l.productName.trim())){alert('أدخل اسم المنتج لكل سطر');return;}

  // التحقق إن الكمية المرتجعة للمورد متاحة فعلاً في المخزن
  for(const l of purRetLines){
    if(!l.productId) continue;
    const qty=Number(l.qty);
    if(!qty||qty<=0){alert('أدخل كمية صحيحة لكل صنف');return;}
    const available=l.expiry?(stockBatches(l.productId).find(([exp])=>exp===l.expiry)?.[1]||0):stockQty(l.productId);
    if(qty>available){
      const p=stock.find(p=>p.id===l.productId);
      alert(`❌ الكمية المتاحة من "${p?.name||'المنتج'}" في المخزن ${available} فقط`);
      return;
    }
  }

  const total=purRetLines.reduce((s,l)=>s+(Number(l.qty)*Number(l.price)),0);
  const retNum=(purchaseReturns.length>0?Math.max(...purchaseReturns.map(r=>r.number||0)):0)+1;
  const ret={id:uid(),number:retNum,supplierId,date,lines:purRetLines.map(l=>({...l,qty:Number(l.qty),price:Number(l.price)})),total,createdAt:new Date().toISOString()};
  purchaseReturns.push(ret);
  // مردود المشتريات بيقلل من المخزن (صادر) لأنه بيرجع للمورد
  purRetLines.forEach(l=>{
    if(l.productId) movements.push({id:uid(),productId:l.productId,type:'out',qty:Number(l.qty),date,note:'مردود مشتريات #'+retNum,purchaseReturnId:ret.id,expiry:l.expiry||''});
  });
  save();
  showPurRetForm=false;
  purRetLines=[{id:uid(),productId:'',productName:'',qty:'',price:'',expiry:''}];
  renderPurReturns();
}

function deletePurRet(id){
  if(!confirm('هتحذف مردود المشتريات ده؟ الكميات هتترجع تتخصم تاني من المخزن.'))return;
  purchaseReturns=purchaseReturns.filter(r=>r.id!==id);
  movements=movements.filter(m=>m.purchaseReturnId!==id);
  save();renderPurReturns();
}

}

async function printPurchaseReturn(retId){
  const ret=purchaseReturns.find(r=>r.id===retId);
  if(!ret)return;
  const s=suppliers.find(s=>s.id===ret.supplierId);
  const rows=(ret.lines||[]).map(l=>{
    const pName=l.productName||stock.find(p=>p.id===l.productId)?.name||'—';
    return `<tr><td>${pName}${l.expiry?'<br><small style="color:#717D7E">صلاحية: '+l.expiry+'</small>':''}</td><td>${l.qty}</td><td>${fmt(l.price)}</td><td>${fmt(l.qty*l.price)}</td></tr>`;
  }).join('');
  const body=`
    <div class="doc-info">
      <div><strong>المورد:</strong> ${s?.name||'—'}</div>
      <div><strong>رقم المردود:</strong> #${ret.number}</div>
      <div><strong>التاريخ:</strong> ${ret.date}</div>
    </div>
    <table><thead><tr><th>المنتج</th><th>الكمية</th><th>السعر</th><th>الإجمالي</th></tr></thead><tbody>${rows}</tbody></table>
    <div class="doc-total">إجمالي المردود: ${fmt(ret.total)} جنيه</div>`;
  await sendDocument(`مردود مشتريات #${ret.number}`, body, `مردود-مشتريات-${ret.number}.pdf`);
}

function initActivation(){
  // توليد كود الجهاز — بيتخزن مرة واحدة في الجهاز ده بس
  let dCode = DB.get('_dc');
  if(!dCode){
    dCode = Math.floor(1000 + Math.random() * 9000);
    DB.set('_dc', dCode);
  }

  // فحص لو مفعّل تفعيل دائم
  const activated = DB.get('_ak');
  if(activated && _vk(dCode, activated)){
    render();
    return;
  }

  // فحص لو في فترة تجريبية
  const trialStart = DB.get('_ts');
  const trialActivated = DB.get('_ta');
  if(trialStart && trialActivated && _vt(dCode, trialActivated)){
    const daysPassed = (Date.now() - trialStart) / (1000*60*60*24);
    if(daysPassed < 7){
      // التجربة لسه شغالة
      render();
      _showTrialBanner(7 - Math.floor(daysPassed));
      return;
    }
    // التجربة خلصت
    _showLockScreen(dCode, true);
    return;
  }

  // مش مفعّل ومفيش تجربة — وقف البرنامج
  _showLockScreen(dCode, false);
}

function _showTrialBanner(daysLeft){
  if(document.getElementById('trialBanner')) return;
  const banner = document.createElement('div');
  banner.id = 'trialBanner';
  banner.style.cssText = 'background:#F39C12;color:#fff;text-align:center;padding:6px;font-size:12px;font-weight:bold;position:relative;z-index:100;display:flex;align-items:center;justify-content:center;gap:8px;flex-wrap:wrap;';
  banner.innerHTML = `<span>⏳ النسخة التجريبية — باقي <strong>${daysLeft}</strong> ${daysLeft===1?'يوم':'أيام'}</span>
    <button onclick="_openActivationFromTrial()" style="background:#fff;color:#F39C12;border:none;border-radius:6px;padding:4px 12px;font-size:11px;font-weight:bold;cursor:pointer">🔓 فعّل دلوقتي</button>`;
  const header = document.querySelector('.header');
  if(header) header.insertAdjacentElement('afterend', banner);
}

function _openActivationFromTrial(){
  const dCode = DB.get('_dc');
  _showLockScreen(dCode, false, true);
}

function _closeLockScreenFromTrial(){
  const ls=document.getElementById('lockScreen');
  if(ls) ls.remove();
  const header = document.querySelector('.header');
  const tabs = document.querySelector('.tabs');
  const body = document.querySelector('.body');
  const wm = document.querySelector('.watermark');
  if(header) header.style.display='';
  if(tabs) tabs.style.display='';
  if(body) body.style.display='';
  if(wm) wm.style.display='';
  const tb=document.getElementById('trialBanner');
  if(tb) tb.style.display='';
}

function _showLockScreen(dCode, trialExpired, fromTrial){
  const header = document.querySelector('.header');
  const tabs = document.querySelector('.tabs');
  const body = document.querySelector('.body');
  const wm = document.querySelector('.watermark');
  if(header) header.style.display='none';
  if(tabs) tabs.style.display='none';
  if(body) body.style.display='none';
  if(wm) wm.style.display='none';
  const trialBanner = document.getElementById('trialBanner');
  if(trialBanner) trialBanner.style.display='none';

  const extensionUsed = !!DB.get('_te');
  const expiredMsg = trialExpired
    ? `<div style="background:rgba(231,76,60,.3);border-radius:8px;padding:10px;margin-bottom:20px;font-size:13px;">⏰ انتهت فترة التجربة المجانية (7 أيام)<br>${extensionUsed?'للاستمرار فعّل النسخة الكاملة':'تقدر تاخد أسبوع إضافي أو تفعّل النسخة الكاملة'}</div>`
    : `<div style="font-size:13px;opacity:.85;margin-bottom:20px;">للتجربة المجانية 7 أيام أو التفعيل الدائم<br>تواصل مع المبرمج على واتساب</div>`;

  const lockScreen = document.createElement('div');
  lockScreen.id = 'lockScreen';
  lockScreen.style.cssText = `
    position:fixed;top:0;left:0;right:0;bottom:0;
    background:linear-gradient(135deg,#1A5276,#1E8449);
    display:flex;flex-direction:column;align-items:center;
    justify-content:center;z-index:99999;padding:30px;
    font-family:'Segoe UI',Tahoma,Arial,sans-serif;color:#fff;text-align:center;
    -webkit-overflow-scrolling:touch;overflow-y:auto;
  `;
  lockScreen.innerHTML = `
    ${fromTrial?`<button onclick="_closeLockScreenFromTrial()" style="position:absolute;top:14px;left:14px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:6px;padding:6px 12px;font-size:12px;cursor:pointer">✕ رجوع</button>`:''}
    <div style="font-size:50px;margin-bottom:16px;">${trialExpired?'⏰':'🔒'}</div>
    <div style="font-size:20px;font-weight:bold;margin-bottom:8px;">مدير البيطري المتكامل</div>
    ${expiredMsg}
    <div style="background:rgba(255,255,255,.15);border-radius:12px;padding:20px 24px;margin-bottom:24px;width:100%;max-width:320px;">
      <div style="font-size:13px;opacity:.9;margin-bottom:10px;">أرسل كود الجهاز ده للمبرمج على واتساب:</div>
      <div style="font-size:36px;font-weight:bold;letter-spacing:8px;color:#FFD700;">${dCode}</div>
      <div style="font-size:11px;opacity:.7;margin-top:6px;">كود الجهاز</div>
    </div>
    <div style="display:flex;gap:10px;margin-bottom:12px;width:100%;max-width:320px;">
      <input id="serialInput" type="number" placeholder="أدخل الكود هنا" style="
        flex:1;padding:12px;border-radius:8px;border:2px solid rgba(255,255,255,.4);
        background:rgba(255,255,255,.1);color:#fff;font-size:16px;text-align:center;
        outline:none;direction:ltr;-webkit-appearance:none;
      ">
    </div>
    ${!trialExpired && !fromTrial?`
    <button onclick="_activateTrial(${dCode})" style="
      background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.6);border-radius:8px;
      padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;
      width:100%;max-width:320px;margin-bottom:8px;-webkit-appearance:none;
    ">🎁 تفعيل النسخة التجريبية (7 أيام)</button>`:''}
    ${trialExpired && !extensionUsed?`
    <button onclick="_activateExtension(${dCode})" style="
      background:rgba(255,255,255,.2);color:#fff;border:2px solid rgba(255,255,255,.6);border-radius:8px;
      padding:12px 40px;font-size:14px;font-weight:bold;cursor:pointer;
      width:100%;max-width:320px;margin-bottom:8px;-webkit-appearance:none;
    ">📅 تفعيل أسبوع إضافي</button>`:''}
    <button onclick="_activate(${dCode})" style="
      background:#FFD700;color:#1A5276;border:none;border-radius:8px;
      padding:14px 40px;font-size:16px;font-weight:bold;cursor:pointer;
      width:100%;max-width:320px;-webkit-appearance:none;
    ">✓ تفعيل النسخة الكاملة</button>
    <div id="activationMsg" style="margin-top:14px;font-size:13px;min-height:20px;"></div>
    <div style="margin-top:30px;font-size:12px;opacity:.7;">
      للتفعيل تواصل مع المبرمج على واتساب<br>
      <strong>01552623744</strong>
    </div>
  `;
  document.body.appendChild(lockScreen);
}

document.addEventListener('DOMContentLoaded', async function(){
  await loadAllData();
  initActivation();
  renderCompanyBar();
  checkExportReminder();
  checkNewFeatureNotif();
  setTimeout(()=>{ checkAutoBackup(); }, 4000);
  setTimeout(()=>{
    const splash=document.getElementById('splashScreen');
    if(splash) splash.remove();
  },2700);
});

// معادلة التحقق من كود التفعيل الدائم
function _vk(c,k){
  const _a='\x36\x35',_b='\x31\x33',_c='\x34\x35\x37',_d='\x39\x31';
  const _x=c,_y=Number(_b),_z=Number(_c),_w=Number(_d);
  const _p=(_x*_y+_z)*3-_w;
  return Number(k)===_p;
}

// معادلة التحقق من كود التجربة (مختلفة عن الدائم)
function _vt(c,k){
  const _p=(c*7+199)*2-83;
  return Number(k)===_p;
}

// معادلة التحقق من كود الأسبوع الإضافي (منفصلة تمامًا عن الدائم والتجربة)
function _ve(c,k){
  const _p=(c*11+331)*2-67;
  return Number(k)===_p;
}

// تفعيل أسبوع إضافي بعد انتهاء التجربة — مرة واحدة فقط لكل جهاز
function _activateExtension(dCode){
  const serial = document.getElementById('serialInput').value.trim();
  const msg = document.getElementById('activationMsg');
  if(!serial){ msg.style.color='#FFD700'; msg.textContent='من فضلك أدخل الكود'; return; }
  if(DB.get('_te')){ msg.style.color='#FF6B6B'; msg.textContent='❌ الأسبوع الإضافي اتفعّل قبل كده على الجهاز ده'; return; }
  if(_ve(dCode, serial)){
    DB.set('_ts', Date.now()); // إعادة بدء عد الأيام من دلوقتي (7 أيام جديدة)
    DB.set('_te', true); // منع استخدام الخاصية دي مرة تانية على نفس الجهاز
    msg.style.color='#90EE90';
    msg.textContent='✅ تم تفعيل أسبوع إضافي! جاري الفتح...';
    setTimeout(()=>{
      document.getElementById('lockScreen').remove();
      document.querySelector('.header').style.display='';
      document.querySelector('.tabs').style.display='';
      document.querySelector('.body').style.display='';
      const wm=document.querySelector('.watermark');
      if(wm)wm.style.display='';
      render();
      _showTrialBanner(7);
    },1200);
  } else {
    msg.style.color='#FF6B6B';
    msg.textContent='❌ الكود غلط، تأكد من الكود وحاول تاني';
  }
}

// تفعيل النسخة التجريبية
function _activateTrial(dCode){
  const serial = document.getElementById('serialInput').value.trim();
  const msg = document.getElementById('activationMsg');
  if(!serial){ msg.style.color='#FFD700'; msg.textContent='من فضلك أدخل كود التجربة'; return; }
  if(_vt(dCode, serial)){
    DB.set('_ta', serial);
    DB.set('_ts', Date.now());
    msg.style.color='#90EE90';
    msg.textContent='✅ تم تفعيل التجربة! جاري الفتح...';
    setTimeout(()=>{
      document.getElementById('lockScreen').remove();
      document.querySelector('.header').style.display='';
      document.querySelector('.tabs').style.display='';
      document.querySelector('.body').style.display='';
      const wm=document.querySelector('.watermark');
      if(wm)wm.style.display='';
      render();
      _showTrialBanner(7);
    },1200);
  } else {
    msg.style.color='#FF6B6B';
    msg.textContent='❌ الكود غلط، تأكد من الكود وحاول تاني';
  }
}

// تفعيل النسخة الكاملة الدائمة
function _activate(dCode){
  const serial = document.getElementById('serialInput').value.trim();
  const msg = document.getElementById('activationMsg');
  if(!serial){ msg.style.color='#FFD700'; msg.textContent='من فضلك أدخل كود التفعيل'; return; }
  if(_vk(dCode, serial)){
    DB.set('_ak', serial);
    // امسح بيانات التجربة
    DB.set('_ta', null);
    DB.set('_ts', null);
    msg.style.color='#90EE90';
    msg.textContent='✅ تم التفعيل بنجاح! جاري الفتح...';
    setTimeout(()=>{
      document.getElementById('lockScreen').remove();
      document.querySelector('.header').style.display='';
      document.querySelector('.tabs').style.display='';
      document.querySelector('.body').style.display='';
      const wm=document.querySelector('.watermark');
      if(wm)wm.style.display='';
      const tb=document.getElementById('trialBanner');
      if(tb) tb.remove();
      render();
    },1200);
  } else {
    msg.style.color='#FF6B6B';
    msg.textContent='❌ الكود غلط، تأكد من الكود وحاول تاني';
  }
}
